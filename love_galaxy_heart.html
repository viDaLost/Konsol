<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Galaxy Heart</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 50% 45%, rgba(255, 205, 240, 0.10), transparent 16%),
                radial-gradient(circle at 22% 18%, rgba(193, 112, 255, 0.14), transparent 30%),
                radial-gradient(circle at 76% 28%, rgba(255, 110, 160, 0.12), transparent 28%),
                radial-gradient(circle at 56% 84%, rgba(145, 98, 255, 0.10), transparent 34%),
                #04040a;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle, rgba(10, 8, 20, 0.30), rgba(2, 2, 8, 0.84));
            color: rgba(255,255,255,0.94);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            font-size: clamp(18px, 2vw, 28px);
            z-index: 10;
            transition: opacity 0.7s ease, visibility 0.7s ease;
            backdrop-filter: blur(8px);
        }
        #loading.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .vignette {
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 2;
            background:
                radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.10) 66%, rgba(0,0,0,0.62) 100%),
                linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 20%, transparent 80%, rgba(255,255,255,0.04));
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка галактики любви...</div>
    <div id="canvas-container">
        <div class="vignette"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loadingEl = document.getElementById('loading');

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x06050c, 0.0062);

        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 1400);
        camera.position.set(0, 12, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.22;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.045;
        controls.minDistance = 9;
        controls.maxDistance = 68;
        controls.maxPolarAngle = Math.PI * 0.76;
        controls.target.set(0, 0.2, 0);

        const galaxyGroup = new THREE.Group();
        const overlayGroup = new THREE.Group();
        const floatingGroup = new THREE.Group();
        scene.add(galaxyGroup, overlayGroup, floatingGroup);

        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous');

        const floatingObjects = [];
        const orbitObjects = [];
        const heartParts = [];
        const tintResponsive = [];
        let heartGlowSprite;
        let heartMesh;
        let heartBackSprite;
        let galaxyStars;
        let galaxyDust;
        let galaxyStreams;
        let deepStars;
        let farNebula;
        let coreRing;
        let auraRing;

        const romanticPhrases = [
            'Люблю тебя',
            'Ты моё сердце',
            'Ты моя вселенная',
            'С тобой навсегда',
            'Нежность',
            'Бесконечно люблю',
            'Моё счастье',
            'Только ты',
            'Ты мой свет',
            'Ты моё чудо'
        ];

        const colorPhases = [
            { a: '#ffd6f1', b: '#ffffff', c: '#ff8fd1' },
            { a: '#ffffff', b: '#d3bcff', c: '#b681ff' },
            { a: '#ffd8de', b: '#ffffff', c: '#ff6c8d' },
            { a: '#f4d5ff', b: '#ffffff', c: '#ff9ec8' }
        ];

        const params = {
            radius: 34,
            innerVoid: 5.1,
            particleCount: 26000,
            streamCount: 12000,
            dustCount: 12000,
            arms: 4,
            spin: 4.6
        };

        function hexToColor(hex) {
            return new THREE.Color(hex);
        }

        function blendPhase(time, speed = 0.055) {
            const scaled = time * speed;
            const phase = Math.floor(scaled) % colorPhases.length;
            const next = (phase + 1) % colorPhases.length;
            const mix = scaled - Math.floor(scaled);

            return {
                a: hexToColor(colorPhases[phase].a).lerp(hexToColor(colorPhases[next].a), mix),
                b: hexToColor(colorPhases[phase].b).lerp(hexToColor(colorPhases[next].b), mix),
                c: hexToColor(colorPhases[phase].c).lerp(hexToColor(colorPhases[next].c), mix)
            };
        }

        function createRadialTexture(inner, middle, outer) {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            g.addColorStop(0, inner);
            g.addColorStop(0.34, middle);
            g.addColorStop(1, outer);
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createHeartTexture(fill1 = '#ffffff', fill2 = '#ff82c4', glow = 'rgba(255,120,170,0.35)') {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);

            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, fill1);
            gradient.addColorStop(1, fill2);

            ctx.save();
            ctx.translate(size / 2, size / 2 + 14);
            ctx.scale(9.4, 9.4);

            ctx.shadowColor = glow;
            ctx.shadowBlur = 46;
            ctx.beginPath();
            ctx.moveTo(0, 14);
            ctx.bezierCurveTo(0, 4, -18, -12, -30, -12);
            ctx.bezierCurveTo(-48, -12, -48, 12, -48, 12);
            ctx.bezierCurveTo(-48, 30, -28, 42, 0, 62);
            ctx.bezierCurveTo(28, 42, 48, 30, 48, 12);
            ctx.bezierCurveTo(48, 12, 48, -12, 30, -12);
            ctx.bezierCurveTo(18, -12, 0, 4, 0, 14);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.restore();

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createNebulaTexture(colors) {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < 18; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 120 + Math.random() * 260;
                const color = colors[i % colors.length];
                const g = ctx.createRadialGradient(x, y, r * 0.08, x, y, r);
                g.addColorStop(0, color);
                g.addColorStop(0.34, color.replace(/0\.[0-9]+\)/, '0.10)'));
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            }

            for (let i = 0; i < 460; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const s = Math.random() < 0.95 ? 1.2 : 2.2;
                ctx.fillStyle = `rgba(255,255,255,${0.08 + Math.random() * 0.32})`;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createBackgroundDome() {
            const texture = createNebulaTexture([
                'rgba(255, 151, 212, 0.24)',
                'rgba(178, 126, 255, 0.22)',
                'rgba(255, 255, 255, 0.10)',
                'rgba(255, 102, 140, 0.16)'
            ]);
            const dome = new THREE.Mesh(
                new THREE.SphereGeometry(520, 48, 48),
                new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.BackSide,
                    transparent: true,
                    opacity: 0.94,
                    depthWrite: false
                })
            );
            scene.add(dome);
            return dome;
        }

        function addLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.42);
            const hemi = new THREE.HemisphereLight(0xffd9f1, 0x120915, 0.9);
            const pointA = new THREE.PointLight(0xff9fcb, 34, 160, 2);
            const pointB = new THREE.PointLight(0xc6b5ff, 16, 180, 2);
            pointA.position.set(0, 0, 0);
            pointB.position.set(-12, 6, -16);
            scene.add(ambient, hemi, pointA, pointB);
            tintResponsive.push({ kind: 'light', material: pointA });
            tintResponsive.push({ kind: 'light2', material: pointB });
        }

        function addDeepSpaceStars() {
            const count = 1800;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const colorA = new THREE.Color('#ffffff');
            const colorB = new THREE.Color('#ffcaec');
            const colorC = new THREE.Color('#d1c0ff');

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const radius = 150 + Math.random() * 280;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.cos(phi);
                positions[i3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
                const mixed = colorA.clone().lerp(Math.random() > 0.5 ? colorB : colorC, Math.random() * 0.8);
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.92,
                map: createRadialTexture('rgba(255,255,255,1)', 'rgba(255,255,255,0.70)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            deepStars = new THREE.Points(geometry, material);
            scene.add(deepStars);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function spiralPosition(radius, branch, offset = 0, tightness = params.spin) {
            const base = branch / params.arms * Math.PI * 2;
            const angle = base + radius * tightness * 0.17 + offset;
            return {
                x: Math.cos(angle) * radius,
                z: Math.sin(angle) * radius,
                angle
            };
        }

        function generateGalaxyCore() {
            const positions = new Float32Array(params.particleCount * 3);
            const colors = new Float32Array(params.particleCount * 3);
            const inner = new THREE.Color('#ffffff');
            const mid = new THREE.Color('#ffd0ee');
            const outer = new THREE.Color('#cab7ff');

            for (let i = 0; i < params.particleCount; i++) {
                const i3 = i * 3;
                const branch = i % params.arms;
                const radius = params.innerVoid + Math.pow(Math.random(), 0.82) * (params.radius - params.innerVoid);
                const armOffset = (Math.random() - 0.5) * (0.14 + radius * 0.017);
                const swirl = spiralPosition(radius, branch, armOffset);

                const tangentSpread = (Math.random() - 0.5) * (0.1 + radius * 0.04);
                const radialSpread = (Math.random() - 0.5) * (0.08 + radius * 0.03);
                const dirX = Math.cos(swirl.angle);
                const dirZ = Math.sin(swirl.angle);
                const tangentX = -dirZ;
                const tangentZ = dirX;

                positions[i3] = swirl.x + tangentX * tangentSpread + dirX * radialSpread;
                positions[i3 + 1] = (Math.random() - 0.5) * (0.22 + radius * 0.035);
                positions[i3 + 2] = swirl.z + tangentZ * tangentSpread + dirZ * radialSpread;

                const t = radius / params.radius;
                const mixed = inner.clone();
                mixed.lerp(mid, Math.min(t * 1.28, 1));
                mixed.lerp(outer, Math.max((t - 0.32) / 0.68, 0));
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.125,
                map: createRadialTexture('rgba(255,255,255,1)', 'rgba(255,255,255,0.55)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.94,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyStars = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyStars);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function generateGalaxyStreams() {
            const positions = new Float32Array(params.streamCount * 3);
            const colors = new Float32Array(params.streamCount * 3);
            const a = new THREE.Color('#ffffff');
            const b = new THREE.Color('#ffc0e5');
            const c = new THREE.Color('#ff7ca4');

            for (let i = 0; i < params.streamCount; i++) {
                const i3 = i * 3;
                const branch = i % params.arms;
                const radius = params.innerVoid + 1.5 + Math.pow(Math.random(), 0.58) * (params.radius - params.innerVoid - 1.2);
                const ribbonOffset = Math.sin(radius * 0.82 + branch * 1.4) * 0.11;
                const swirl = spiralPosition(radius, branch, ribbonOffset, params.spin + 0.6);
                const side = (Math.random() - 0.5) * (0.05 + radius * 0.025);
                const thickness = (Math.random() - 0.5) * (0.03 + radius * 0.02);
                const dirX = Math.cos(swirl.angle);
                const dirZ = Math.sin(swirl.angle);
                const tangentX = -dirZ;
                const tangentZ = dirX;

                positions[i3] = swirl.x + tangentX * side;
                positions[i3 + 1] = thickness;
                positions[i3 + 2] = swirl.z + tangentZ * side;

                const t = radius / params.radius;
                const mixed = a.clone();
                mixed.lerp(b, Math.min(t * 1.2, 1));
                mixed.lerp(c, Math.max((t - 0.4) / 0.6, 0));
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.09,
                map: createRadialTexture('rgba(255,255,255,0.95)', 'rgba(255,255,255,0.38)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.64,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyStreams = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyStreams);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function generateGalaxyDust() {
            const positions = new Float32Array(params.dustCount * 3);
            const colors = new Float32Array(params.dustCount * 3);
            const a = new THREE.Color('#ffffff');
            const b = new THREE.Color('#e5cfff');
            const c = new THREE.Color('#ffc7df');

            for (let i = 0; i < params.dustCount; i++) {
                const i3 = i * 3;
                const radius = params.innerVoid + 1 + Math.random() * (params.radius - params.innerVoid + 10);
                const branch = i % params.arms;
                const swirl = spiralPosition(radius, branch, (Math.random() - 0.5) * 0.7, params.spin + 0.2);
                const wide = 0.26 + radius * 0.07;
                positions[i3] = swirl.x + (Math.random() - 0.5) * wide;
                positions[i3 + 1] = (Math.random() - 0.5) * (0.55 + radius * 0.055);
                positions[i3 + 2] = swirl.z + (Math.random() - 0.5) * wide;
                const t = Math.min(radius / (params.radius + 10), 1);
                const mixed = a.clone();
                mixed.lerp(Math.random() > 0.5 ? b : c, Math.random() * 0.8 + t * 0.25);
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.068,
                map: createRadialTexture('rgba(255,255,255,0.75)', 'rgba(255,255,255,0.26)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.38,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyDust = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyDust);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function addOuterAuraRings() {
            const ringTexture = createRadialTexture('rgba(255,255,255,0.95)', 'rgba(255,255,255,0.38)', 'rgba(255,255,255,0)');
            const ringMaterial = new THREE.SpriteMaterial({
                map: ringTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.12
            });

            coreRing = new THREE.Sprite(ringMaterial.clone());
            coreRing.scale.set(16, 16, 1);
            galaxyGroup.add(coreRing);

            auraRing = new THREE.Sprite(ringMaterial.clone());
            auraRing.scale.set(24, 24, 1);
            auraRing.material.opacity = 0.08;
            galaxyGroup.add(auraRing);

            tintResponsive.push({ kind: 'spriteMaterial', material: coreRing.material });
            tintResponsive.push({ kind: 'spriteMaterial', material: auraRing.material });
        }

        function createHeartShape() {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0.55);
            shape.bezierCurveTo(0, 0.05, -0.78, -0.54, -1.28, -0.54);
            shape.bezierCurveTo(-2.00, -0.54, -2.02, 0.46, -2.02, 0.46);
            shape.bezierCurveTo(-2.02, 1.18, -1.23, 1.78, 0, 2.62);
            shape.bezierCurveTo(1.23, 1.78, 2.02, 1.18, 2.02, 0.46);
            shape.bezierCurveTo(2.02, 0.46, 2.00, -0.54, 1.28, -0.54);
            shape.bezierCurveTo(0.78, -0.54, 0, 0.05, 0, 0.55);
            return shape;
        }

        function addHeartCore() {
            const heartShape = createHeartShape();
            const geometry = new THREE.ExtrudeGeometry(heartShape, {
                depth: 0.75,
                bevelEnabled: true,
                bevelSegments: 5,
                steps: 1,
                bevelSize: 0.16,
                bevelThickness: 0.12,
                curveSegments: 42
            });
            geometry.center();

            const material = new THREE.MeshStandardMaterial({
                color: '#fff0f8',
                emissive: '#ff77b9',
                emissiveIntensity: 2.3,
                roughness: 0.22,
                metalness: 0.08,
                transparent: true,
                opacity: 0.98
            });

            heartMesh = new THREE.Mesh(geometry, material);
            heartMesh.scale.set(1.18, 1.18, 0.9);
            heartMesh.position.set(0, 0, 0);
            galaxyGroup.add(heartMesh);
            heartParts.push(heartMesh);
            tintResponsive.push({ kind: 'heartMesh', material });

            heartBackSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: createHeartTexture('#ffffff', '#ff8bc7', 'rgba(255,120,180,0.28)'),
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.74
            }));
            heartBackSprite.scale.set(7.4, 7.0, 1);
            heartBackSprite.position.set(0, 0, -0.5);
            galaxyGroup.add(heartBackSprite);
            heartParts.push(heartBackSprite);
            tintResponsive.push({ kind: 'spriteMaterial', material: heartBackSprite.material });

            heartGlowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: createRadialTexture('rgba(255,255,255,1)', 'rgba(255,170,220,0.45)', 'rgba(255,255,255,0)'),
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.8
            }));
            heartGlowSprite.scale.set(10.5, 10.5, 1);
            galaxyGroup.add(heartGlowSprite);
            heartParts.push(heartGlowSprite);
            tintResponsive.push({ kind: 'spriteMaterial', material: heartGlowSprite.material });
        }

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 62;
            const padX = 42;
            const padY = 30;
            ctx.font = `800 ${fontSize}px Arial`;
            const metrics = ctx.measureText(text);
            canvas.width = Math.ceil(metrics.width + padX * 2);
            canvas.height = fontSize + padY * 2 + 10;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `800 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ffe0f2');
            gradient.addColorStop(0.5, '#ffffff');
            gradient.addColorStop(1, '#efc9ff');

            ctx.lineWidth = 9;
            ctx.strokeStyle = 'rgba(45, 10, 40, 0.48)';
            ctx.shadowColor = 'rgba(255, 110, 190, 0.92)';
            ctx.shadowBlur = 22;
            ctx.strokeText(text, canvas.width / 2, canvas.height / 2 + 1);
            ctx.fillStyle = gradient;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 1);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
                opacity: 0.98
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(canvas.width / 74, canvas.height / 74, 1);
            tintResponsive.push({ kind: 'text', material });
            return sprite;
        }

        function createImageCard(url) {
            const group = new THREE.Group();

            const frame = new THREE.Mesh(
                new THREE.PlaneGeometry(1.82, 2.14),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.94, side: THREE.DoubleSide })
            );
            frame.position.z = -0.01;
            group.add(frame);

            const innerShadow = new THREE.Mesh(
                new THREE.PlaneGeometry(1.64, 1.94),
                new THREE.MeshBasicMaterial({ color: 0x170e18, transparent: true, opacity: 0.22, side: THREE.DoubleSide })
            );
            innerShadow.position.z = -0.005;
            group.add(innerShadow);

            const photoMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.98,
                side: THREE.DoubleSide
            });

            const photo = new THREE.Mesh(new THREE.PlaneGeometry(1.54, 1.84), photoMaterial);
            photo.position.z = 0.01;
            group.add(photo);

            const glow = new THREE.Sprite(new THREE.SpriteMaterial({
                map: createRadialTexture('rgba(255,255,255,0.95)', 'rgba(255,170,220,0.28)', 'rgba(255,255,255,0)'),
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.28
            }));
            glow.scale.set(2.65, 2.85, 1);
            glow.position.z = -0.04;
            group.add(glow);

            textureLoader.load(
                url,
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    photoMaterial.map = texture;
                    photoMaterial.needsUpdate = true;
                },
                undefined,
                () => {
                    const fallback = document.createElement('canvas');
                    fallback.width = 320;
                    fallback.height = 380;
                    const ctx = fallback.getContext('2d');
                    const g = ctx.createLinearGradient(0, 0, 320, 380);
                    g.addColorStop(0, '#ffb5d8');
                    g.addColorStop(1, '#c6b0ff');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, 320, 380);
                    ctx.fillStyle = 'rgba(255,255,255,0.94)';
                    ctx.font = 'bold 34px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Ваше', 160, 165);
                    ctx.fillText('фото', 160, 210);
                    const texture = new THREE.CanvasTexture(fallback);
                    texture.colorSpace = THREE.SRGBColorSpace;
                    photoMaterial.map = texture;
                    photoMaterial.needsUpdate = true;
                }
            );

            tintResponsive.push({ kind: 'photoGlow', material: glow.material });
            return group;
        }

        function addFloatingElements() {
            const total = 30;
            for (let i = 0; i < total; i++) {
                const isText = i % 2 === 0;
                const obj = isText
                    ? createTextSprite(romanticPhrases[Math.floor(Math.random() * romanticPhrases.length)])
                    : createImageCard(`https://picsum.photos/seed/galaxy-love-${i}/500/620`);

                const arm = i % params.arms;
                const radius = 9 + Math.random() * 20;
                const swirl = spiralPosition(radius, arm, (Math.random() - 0.5) * 0.3, params.spin + 0.5);
                const dx = (Math.random() - 0.5) * (isText ? 1.0 : 0.6);
                const dz = (Math.random() - 0.5) * (isText ? 1.0 : 0.6);
                const dy = (Math.random() - 0.5) * 2.8;

                obj.position.set(swirl.x + dx, dy, swirl.z + dz);
                obj.userData = {
                    basePosition: obj.position.clone(),
                    baseScale: isText ? 0.96 + Math.random() * 0.12 : 0.92 + Math.random() * 0.08,
                    floatSpeed: 0.28 + Math.random() * 0.42,
                    floatOffset: Math.random() * Math.PI * 2,
                    swaySpeed: 0.12 + Math.random() * 0.22,
                    swayOffset: Math.random() * Math.PI * 2,
                    isPhoto: !isText,
                    isText,
                    orbitSpeed: 0.022 + Math.random() * 0.018,
                    orbitOffset: Math.random() * Math.PI * 2,
                    radius,
                    arm
                };
                obj.scale.setScalar(obj.userData.baseScale);
                floatingObjects.push(obj);
                floatingGroup.add(obj);
            }
        }

        function addFarNebulaPlanes() {
            const texture = createNebulaTexture([
                'rgba(255,145,202,0.18)',
                'rgba(201,163,255,0.16)',
                'rgba(255,255,255,0.08)',
                'rgba(255,94,128,0.10)'
            ]);

            for (let i = 0; i < 7; i++) {
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(24 + Math.random() * 18, 10 + Math.random() * 8),
                    new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        opacity: 0.12 + Math.random() * 0.06,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        side: THREE.DoubleSide
                    })
                );
                plane.position.set((Math.random() - 0.5) * 58, (Math.random() - 0.5) * 9, (Math.random() - 0.5) * 58);
                plane.rotation.z = Math.random() * Math.PI;
                plane.userData = { rot: (Math.random() - 0.5) * 0.04, drift: Math.random() * Math.PI * 2 };
                overlayGroup.add(plane);
                orbitObjects.push(plane);
                tintResponsive.push({ kind: 'spriteMaterial', material: plane.material });
            }
        }

        farNebula = createBackgroundDome();
        addLights();
        addDeepSpaceStars();
        generateGalaxyCore();
        generateGalaxyStreams();
        generateGalaxyDust();
        addOuterAuraRings();
        addHeartCore();
        addFarNebulaPlanes();
        addFloatingElements();

        const clock = new THREE.Clock();

        function applyPalette(palette, time) {
            renderer.toneMappingExposure = 1.15 + Math.sin(time * 0.22) * 0.05;
            scene.fog.color.copy(palette.a).lerp(palette.c, 0.10);

            tintResponsive.forEach((item) => {
                if (item.kind === 'materialColor') {
                    item.material.color.copy(palette.b).lerp(palette.a, 0.35);
                } else if (item.kind === 'spriteMaterial') {
                    item.material.color.copy(palette.a).lerp(palette.c, 0.20);
                } else if (item.kind === 'heartMesh') {
                    item.material.color.copy(palette.b);
                    item.material.emissive.copy(palette.c).lerp(palette.a, 0.35);
                } else if (item.kind === 'light') {
                    item.material.color.copy(palette.c).lerp(palette.a, 0.24);
                    item.material.intensity = 32 + Math.sin(time * 0.9) * 4;
                } else if (item.kind === 'light2') {
                    item.material.color.copy(palette.a).lerp(palette.b, 0.5);
                    item.material.intensity = 15 + Math.sin(time * 0.6 + 1) * 2;
                } else if (item.kind === 'text') {
                    item.material.color.copy(palette.b);
                } else if (item.kind === 'photoGlow') {
                    item.material.color.copy(palette.a).lerp(palette.c, 0.20);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const palette = blendPhase(t, 0.042);

            applyPalette(palette, t);

            galaxyGroup.rotation.y = t * 0.028;
            galaxyGroup.rotation.z = Math.sin(t * 0.18) * 0.015;
            floatingGroup.rotation.y = t * 0.026;
            overlayGroup.rotation.y = -t * 0.004;
            farNebula.rotation.y = t * 0.002;
            farNebula.rotation.z = Math.sin(t * 0.03) * 0.02;
            if (deepStars) deepStars.rotation.y = t * 0.0018;
            if (galaxyDust) galaxyDust.rotation.y = -t * 0.008;
            if (galaxyStreams) galaxyStreams.rotation.y = t * 0.005;

            const heartPulse = 1 + Math.sin(t * 2.15) * 0.08 + Math.sin(t * 4.3) * 0.025;
            if (heartMesh) {
                heartMesh.scale.set(1.18 * heartPulse, 1.18 * heartPulse, 0.90 * heartPulse);
                heartMesh.rotation.y = Math.sin(t * 0.38) * 0.16;
                heartMesh.rotation.x = Math.sin(t * 0.31) * 0.08;
                heartMesh.quaternion.slerp(camera.quaternion, 0.035);
                heartMesh.rotation.z += 0.008;
            }
            if (heartBackSprite) {
                heartBackSprite.scale.set(7.4 * (1 + Math.sin(t * 2.15) * 0.07), 7.0 * (1 + Math.sin(t * 2.15) * 0.07), 1);
                heartBackSprite.quaternion.copy(camera.quaternion);
            }
            if (heartGlowSprite) {
                heartGlowSprite.scale.set(10.5 * (1 + Math.sin(t * 1.65) * 0.09), 10.5 * (1 + Math.sin(t * 1.65) * 0.09), 1);
                heartGlowSprite.material.opacity = 0.64 + Math.sin(t * 1.4) * 0.10;
            }
            if (coreRing) {
                coreRing.scale.setScalar(16 * (1 + Math.sin(t * 1.8) * 0.035));
                coreRing.material.opacity = 0.12 + Math.sin(t * 1.4) * 0.018;
            }
            if (auraRing) {
                auraRing.scale.setScalar(24 * (1 + Math.sin(t * 1.2 + 0.6) * 0.04));
                auraRing.material.opacity = 0.07 + Math.sin(t * 1.1 + 0.4) * 0.015;
            }

            floatingObjects.forEach((obj, index) => {
                const u = obj.userData;
                const orbitTime = t * u.orbitSpeed + u.orbitOffset;
                const orbitRadius = u.radius + Math.sin(t * 0.18 + index) * 0.26;
                const swirl = spiralPosition(orbitRadius, u.arm, Math.sin(orbitTime) * 0.08, params.spin + 0.55);
                obj.position.x = swirl.x + Math.cos(t * u.swaySpeed + u.swayOffset) * 0.24;
                obj.position.y = u.basePosition.y + Math.sin(t * u.floatSpeed + u.floatOffset) * 0.38;
                obj.position.z = swirl.z + Math.sin(t * (u.swaySpeed * 0.9) + u.swayOffset) * 0.24;
                obj.scale.setScalar(u.baseScale * (1 + Math.sin(t * 0.9 + index) * 0.02));
                obj.quaternion.copy(camera.quaternion);
            });

            orbitObjects.forEach((obj) => {
                obj.rotation.z += obj.userData.rot * 0.002;
                obj.position.y += Math.sin(t * 0.15 + obj.userData.drift) * 0.0015;
                obj.quaternion.slerp(camera.quaternion, 0.02);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
        });

        setTimeout(() => loadingEl.classList.add('hidden'), 900);
    </script>
</body>
</html>
