<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Valentín</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f0eb;
            --text-color: #4a3b32;
            --tree-brown: #8a5a3a;
            --line-color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
        }

        /* --- СТАРТОВЫЙ ЭКРАН --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            background-color: var(--bg-color);
            transition: opacity 0.5s ease;
        }

        .start-heart {
            width: 80px; height: 80px;
            background-color: #d9383a;
            position: relative;
            transform: rotate(-45deg);
            animation: pulse 1s infinite;
        }

        .start-heart::before, .start-heart::after {
            content: ''; width: 80px; height: 80px;
            background-color: #d9383a;
            border-radius: 50%;
            position: absolute;
        }

        .start-heart::before { top: -40px; left: 0; }
        .start-heart::after { top: 0; left: 40px; }

        .start-text {
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #d9383a;
        }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        /* --- ЛИНИЯ ЗЕМЛИ --- */
        .ground-line {
            position: absolute;
            bottom: 6%; 
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--line-color);
            z-index: 10;
        }

        /* --- ТЕКСТ И СЧЕТЧИК --- */
        #text-section {
            position: absolute;
            top: 25%;
            left: 8%;
            width: 45%;
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 1.2s ease, transform 1.2s ease;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #text-section.visible {
            opacity: 1;
            transform: translateX(0);
        }

        #poem-container {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .poem-line { margin-bottom: 20px; }
        .author { margin-top: 20px; font-weight: 600; }

        .timer-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .timer-numbers {
            display: flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .timer-numbers span.num { font-size: 2.5rem; font-weight: 600; }
        .timer-label { font-size: 1rem; margin-right: 15px; color: #666; }

        /* --- ДЕРЕВО --- */
        #tree-container {
            position: absolute;
            bottom: calc(6% + 4px); 
            left: 50%;
            transform: translateX(-50%) scale(1.1);
            transform-origin: bottom center;
            width: 500px;
            height: 400px; /* Высота синхронизирована с viewBox SVG */
            z-index: 5;
            transition: all 1.2s ease-in-out;
            pointer-events: none;
        }

        #tree-container.shifted {
            left: 75%;
            transform: translateX(-50%) scale(0.85);
        }

        /* Крона (Сердечки) - теперь растянута на весь контейнер дерева */
        .leaves-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
        }

        .leaf-heart {
            position: absolute;
            width: 18px; height: 18px; 
            transform: rotate(-45deg) scale(0);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease;
        }

        .leaf-heart::before, .leaf-heart::after {
            content: ''; width: 100%; height: 100%;
            border-radius: 50%;
            position: absolute;
            background-color: inherit;
        }

        .leaf-heart::before { top: -50%; left: 0; }
        .leaf-heart::after { top: 0; left: 50%; }

        @keyframes fall {
            0% { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; }
            100% { transform: translate(-30vw, 70vh) rotate(-90deg) scale(0.6); opacity: 0; }
        }

        .falling {
            animation: fall 3s ease-in forwards !important;
        }

        @media (max-width: 900px) {
            #tree-container.shifted {
                left: 50%;
                transform: translateX(-50%) scale(0.65);
            }

            #text-section {
                top: 5%;
                left: 5%;
                width: 90%;
                transform: translateY(-30px);
            }

            #text-section.visible {
                transform: translateY(0);
            }

            #poem-container { font-size: 2rem; margin-bottom: 20px; }
            .timer-numbers span.num { font-size: 2rem; }
            .timer-label { margin-right: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startAnimation()">
        <div class="start-heart"></div>
        <div class="start-text">San Valentín</div>
    </div>

    <div id="text-section">
        <div id="poem-container">
            <div class="poem-line">Para el amor de mi vida:</div>
            <div class="poem-line">Si pudiera elegir un lugar<br>seguro, sería a tu lado.</div>
            <div class="poem-line">Cuanto más tiempo estoy<br>contigo más te amo.</div>
            <div class="author">— I Love You!</div>
        </div>
        <div class="timer-container" id="timer-box">
            <div class="timer-title">Mi amor por ti comenzó hace...</div>
            <div class="timer-numbers">
                <span class="num" id="days">0</span> <span class="timer-label">días</span> 
                <span class="num" id="hours">0</span> <span class="timer-label">horas</span> 
                <span class="num" id="mins">0</span> <span class="timer-label">minutos</span> 
                <span class="num" id="secs">0</span> <span class="timer-label">segundos</span>
            </div>
        </div>
    </div>

    <div id="tree-container">
        </div>

    <div class="ground-line"></div>

    <script>
        const startDate = new Date(2025, 1, 14, 12, 0, 0); 
        const colors = ['#a62c2b', '#d9383a', '#f27b82', '#f7b2b7', '#c92a2a', '#e85d68'];

        function startAnimation() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                growTree();
            }, 400); 
        }

        function growTree() {
            const treeContainer = document.getElementById('tree-container');
            
            // Внедряем SVG с кривыми Безье для создания органичных изгибов.
            // Анимация реализуется через clipPath, который "открывает" дерево снизу вверх.
            treeContainer.innerHTML = `
                <svg id="tree-svg" viewBox="0 0 500 400" style="position:absolute; bottom:0; left:0; width:100%; height:100%; z-index:5;">
                    <defs>
                        <clipPath id="tree-clip">
                            <rect x="0" y="400" width="500" height="0">
                                <animate attributeName="y" from="400" to="0" dur="1.2s" fill="freeze" />
                                <animate attributeName="height" from="0" to="400" dur="1.2s" fill="freeze" />
                            </rect>
                        </clipPath>
                    </defs>
                    <g clip-path="url(#tree-clip)" fill="var(--tree-brown)">
                        <path d="M 225,400 Q 240,250 247.5,60 L 252.5,60 Q 260,250 275,400 Z" />
                        
                        <path d="M 235,320 Q 150,320 80,180 Q 160,280 242,295 Z" /> <path d="M 262,290 Q 350,290 420,160 Q 340,260 256,265 Z" /> <path d="M 242,220 Q 180,210 110,90 Q 190,180 246,195 Z" /> <path d="M 254,180 Q 320,170 390,70 Q 310,150 249,160 Z" /> <path d="M 246,120 Q 200,100 160,20 Q 210,80 250,100 Z" /> <path d="M 251,90 Q 290,70 340,10 Q 280,60 248,70 Z" /> </g>
                </svg>
                <div class="leaves-container" id="leaves"></div>
            `;

            setTimeout(() => { spawnLeavesInHeartShape(); }, 1200);
        }

        function spawnLeavesInHeartShape() {
            const container = document.getElementById('leaves');
            const totalLeaves = 650; // Увеличено для густоты разросшейся кроны
            const radius = 180; // Расширенный радиус математически перекрывает концы всех веток
            let count = 0;
            let attempts = 0;

            while (count < totalLeaves && attempts < 10000) {
                const x = (Math.random() * 2 - 1) * 1.5; 
                const y = (Math.random() * 2 - 1) * 1.5;
                const y_math = -y; 
                
                const eq = Math.pow(x*x + y_math*y_math - 1, 3) - (x*x * Math.pow(y_math, 3));
                
                if (eq <= 0) {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf-heart';
                    leaf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    // Смещаем центр кроны ниже (y = 150) внутри пространства 500x400
                    // -9px центрирует само 18px сердечко относительно рассчитанной точки
                    leaf.style.left = (x * radius + 250 - 9) + 'px';
                    leaf.style.top = (y * radius + 150 - 9) + 'px';
                    
                    const scale = 0.5 + Math.random() * 0.7; 
                    container.appendChild(leaf);

                    setTimeout(() => {
                        leaf.style.transform = `rotate(${Math.random() * 60 - 75}deg) scale(${scale})`;
                        leaf.style.opacity = '1';
                    }, Math.random() * 800); 
                    count++;
                }
                attempts++;
            }

            setTimeout(() => {
                document.getElementById('tree-container').classList.add('shifted');
                document.getElementById('text-section').classList.add('visible');
                startTimer();
                startFallingLeaves();
            }, 1500); 
        }

        function startTimer() {
            function update() {
                const now = new Date();
                const diff = now - startDate;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                const secs = Math.floor((diff / 1000) % 60);

                document.getElementById('days').innerText = days;
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('mins').innerText = mins.toString().padStart(2, '0');
                document.getElementById('secs').innerText = secs.toString().padStart(2, '0');
            }
            update();
            setInterval(update, 1000);
        }

        function startFallingLeaves() {
            const leaves = document.querySelectorAll('.leaf-heart');
            setInterval(() => {
                if(leaves.length > 0) {
                    const randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
                    const fallingLeaf = randomLeaf.cloneNode(true);
                    
                    fallingLeaf.style.transform = randomLeaf.style.transform; 
                    document.getElementById('leaves').appendChild(fallingLeaf);
                    
                    setTimeout(() => fallingLeaf.classList.add('falling'), 50);
                    setTimeout(() => fallingLeaf.remove(), 3500);
                }
            }, 800);
        }
    </script>
</body>
</html>
