<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Universal Code Console — v3 (Pro Editor + Mobile UI)</title>
  
  <style>
    :root {
      --bg:#0f1117; --panel:#111827; --panel-2:#0b1220; --text:#e5e7eb; --muted:#9aa4b2;
      --accent:#7aa2f7; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --shadow:0 10px 25px rgba(0,0,0,.25);
      --radius:16px; --radius-sm:10px; --pad:14px; --gap:14px; --border:1px solid rgba(255,255,255,.08);
    }
    [data-theme="light"] {
      --bg:#f6f7fb; --panel:#ffffff; --panel-2:#f5f7fb; --text:#0b1220; --muted:#495469; 
      --accent:#3b82f6; --shadow:0 10px 24px rgba(2,6,23,.08); --border:1px solid rgba(0,0,0,.08);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height:100%; margin:0; overflow:hidden; }
    body { background:var(--bg); color:var(--text); font:14px/1.5 system-ui,-apple-system,sans-serif; display:flex; flex-direction:column; }
    
    .app { flex:1; display:flex; flex-direction:column; gap:var(--gap); padding:clamp(10px,2vw,18px); min-height:0; }
    header { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .title { display:flex; align-items:center; gap:10px; }
    .title b { font-size:16px; }
    .buttons { display:flex; flex-wrap:wrap; gap:8px; }
    
    button, .chip, select { 
      border:var(--border); background:var(--panel); color:var(--text); padding:8px 12px; 
      border-radius:10px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:13px;
    }
    button:active { transform:scale(0.97); }
    .primary { background:var(--accent); color:#fff; border:none; font-weight:600; }
    .ghost { background:var(--panel-2); }
    
    .layout { display:flex; flex:1; gap:var(--gap); min-height:0; }
    .col { flex:1; display:flex; flex-direction:column; gap:var(--gap); min-width:0; }
    
    .card { background:var(--panel); border:var(--border); border-radius:var(--radius); box-shadow:var(--shadow); display:flex; flex-direction:column; min-height:0; flex:1; overflow:hidden; }
    .card h3 { margin:0; padding:10px 14px; border-bottom:var(--border); background:var(--panel-2); font-size:13px; font-weight:600; color:var(--muted); display:flex; justify-content:space-between; }
    
    /* Editor */
    #editor { flex:1; width:100%; font-family: 'Fira Code', monospace; font-size: 14px; }
    .editorWrap { flex: 1.2; }
    
    /* Console & Preview */
    .previewCard { flex:1; display:none; }
    iframe { width:100%; height:100%; border:0; background:#fff; }
    .consoleCard { flex:1; }
    .log { flex:1; overflow-y:auto; padding:10px; font-family: monospace; font-size: 13px; }
    .row { display:flex; gap:8px; padding:6px 8px; border-radius:var(--radius-sm); border-bottom: 1px solid rgba(128,128,128,0.1); word-break: break-word; }
    .row.info { color: var(--accent); }
    .row.warn { color: var(--warn); background:color-mix(in oklab, var(--warn) 10%, transparent); }
    .row.error { color: var(--err); background:color-mix(in oklab, var(--err) 10%, transparent); }
    .row .tag { font-weight:700; font-size:11px; opacity:0.7; padding-top:2px; }
    .row pre { margin:0; white-space:pre-wrap; }

    /* Mobile Tabs Navigation */
    .mobile-tabs { display:none; background:var(--panel-2); border-top:var(--border); padding:10px; padding-bottom:env(safe-area-inset-bottom, 10px); gap:8px; }
    .tab-btn { flex:1; justify-content:center; padding:12px; font-weight:600; background:var(--panel); border:var(--border); }
    .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* Mobile Responsive */
    @media (max-width:1100px) {
      .app { padding: 0; gap: 0; }
      header { padding: 12px; background:var(--panel-2); border-bottom:var(--border); }
      .hint { display:none; } /* Прячем подсказки на мобильном для экономии места */
      .layout { flex-direction: column; }
      .col { display:none; border-radius: 0; border: none; flex: 1; }
      .col.active { display:flex; }
      .card { border-radius: 0; border: none; border-bottom: var(--border); }
      .mobile-tabs { display:flex; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <b>Universal Console v3</b>
        <span class="hint" id="status">Готов к работе</span>
      </div>
      <div class="buttons">
        <select id="override">
          <option value="auto">Язык: Авто</option>
          <option value="html">HTML/CSS/JS</option>
          <option value="jsx">React (JSX)</option>
          <option value="js">JavaScript</option>
          <option value="ts">TypeScript</option>
          <option value="py">Python</option>
          <option value="lua">Lua</option>
        </select>
        <button class="primary" id="runBtn">▶ Запуск</button>
        <button class="ghost" id="clearBtn">Очистить код</button>
        <button class="ghost" id="themeBtn">🌓</button>
      </div>
    </header>

    <div class="layout">
      <div class="col editorWrap active" id="tab-editor">
        <div class="card" style="border:none; border-radius:0;">
          <div id="editor"></div>
        </div>
      </div>

      <div class="col" id="tab-output">
        <div class="card previewCard" id="previewCard">
          <h3><span>🖥 Предпросмотр</span></h3>
          <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>
        </div>

        <div class="card consoleCard" id="consoleCard">
          <h3>
            <span>📟 Консоль</span>
            <button id="clearConsole" class="ghost" style="padding:4px 8px; font-size:11px;">Очистить лог</button>
          </h3>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>

    <div class="mobile-tabs">
      <button class="tab-btn active" data-target="tab-editor">Редактор</button>
      <button class="tab-btn" data-target="tab-output" id="outputTabBtn">Вывод</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>
  
  <script>
    const $ = s => document.querySelector(s);
    const logEl = $('#log');
    const previewCard = $('#previewCard');
    const previewFrame = $('#frame');

    // Настройка Ace Editor
    const editor = ace.edit("editor");
    editor.setOptions({
      fontSize: "14px",
      showPrintMargin: false,
      wrap: true,
      useWorker: false // Отключаем лишние ошибки линтера в консоли
    });
    
    // Темизация
    function applyTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      editor.setTheme(isDark ? "ace/theme/tomorrow_night_eighties" : "ace/theme/chrome");
    }
    
    $('#themeBtn').onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('ucc3_theme', next);
      applyTheme();
    };
    if(localStorage.getItem('ucc3_theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('ucc3_theme'));
    applyTheme();

    // Мобильные табы
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });

    // Консоль
    function addRow(kind, text) {
      const row = document.createElement('div'); row.className = `row ${kind}`;
      row.innerHTML = `<span class="tag">${kind.toUpperCase()}</span><pre>${text}</pre>`;
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }
    $('#clearConsole').onclick = () => logEl.innerHTML = '';

    // Очистка кода (Тотальная)
    $('#clearBtn').onclick = () => {
      if(!confirm('Внимание: это полностью удалит текущий код. Продолжить?')) return;
      editor.setValue('', -1);
      logEl.innerHTML = '';
      previewFrame.srcdoc = '';
      previewCard.style.display = 'none';
      localStorage.removeItem('ucc3_code');
    };

    // Сохранение и загрузка
    editor.session.on('change', () => {
      localStorage.setItem('ucc3_code', editor.getValue());
      detectAndApplyMode();
    });

    const DEFAULT_CODE = `// Пример JS кода\nconst greet = (name) => {\n  console.log(\`Привет, \${name}! Вы находитесь в универсальной консоли.\`);\n};\n\ngreet("Разработчик");`;
    editor.setValue(localStorage.getItem('ucc3_code') || DEFAULT_CODE, -1);

    // Определение языка и режима Ace
    function detectLang(code) {
      const ov = $('#override').value; if(ov !== 'auto') return ov;
      if(/import React|<[a-z]+>.*<\/[a-z]+>/i.test(code) && !/<html/i.test(code)) return 'jsx';
      if(/<\s*html\b/i.test(code) || /<style|<div|<span|<h1/i.test(code)) return 'html';
      if(/:\s*(number|string|boolean|any)\b|\binterface\b/.test(code)) return 'ts';
      if(/\bdef\s+\w+\(|\bimport\s+\w+|print\s*\(/.test(code) && !/[;{}]/.test(code)) return 'py';
      if(/\bfunction\b|\blocal\b|\bend\b/.test(code) && !/=>|class/.test(code)) return 'lua';
      return 'js';
    }

    function detectAndApplyMode() {
      const lang = detectLang(editor.getValue());
      const modeMap = { html:'html', jsx:'javascript', js:'javascript', ts:'typescript', py:'python', lua:'lua' };
      editor.session.setMode(`ace/mode/${modeMap[lang] || 'javascript'}`);
      
      // Показываем превью только для визуальных форматов
      if(['html', 'jsx'].includes(lang)) {
        previewCard.style.display = 'flex';
      } else {
        previewCard.style.display = 'none';
        $('#consoleCard').style.display = 'flex';
      }
      return lang;
    }

    // --- Инфраструктура запуска кода ---
    function loadScript(src) {
      return new Promise((res, rej) => {
        if(document.querySelector(`script[src="${src}"]`)) return res();
        const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    function generateIframeDoc(jsCode, includeReact = false) {
      const reactDeps = includeReact ? `
        <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
        <div id="root"></div>
      ` : '';
      
      return `<!DOCTYPE html><html><head><meta charset="utf-8">
        <style>body{font-family:system-ui; color:#333; padding:10px; margin:0}</style>
      </head><body>
      ${reactDeps}
      <script>
        (function(){
          function send(k, a){ parent.postMessage({type:'console', level:k, args:[].slice.call(a)}, '*'); }
          ['log','info','warn','error'].forEach(fn => { const o=console[fn]; console[fn]=function(){ send(fn, arguments); o&&o.apply(console, arguments); } });
          window.onerror = (msg, url, line, col, err) => send('error', [\`\${msg} at line \${line}\`]);
        })();
      <\/script>
      <script>${jsCode}<\/script>
      </body></html>`;
    }

    async function run() {
      const code = editor.getValue();
      const lang = detectAndApplyMode();
      $('#log').innerHTML = ''; // Очищаем консоль при запуске
      
      // Авто-переключение на вкладку вывода на мобильных
      if(window.innerWidth <= 1100) $('#outputTabBtn').click();

      try {
        if (lang === 'html') {
          // Если это чистый HTML, оборачиваем только перехватчик консоли
          previewFrame.srcdoc = code.includes('<html') ? code : generateIframeDoc('') + code;
        } 
        else if (lang === 'jsx') {
          addRow('info', 'Компиляция React (Babel)...');
          await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
          const compiled = Babel.transform(code, { presets: ['react', 'env'] }).code;
          previewFrame.srcdoc = generateIframeDoc(compiled, true);
        }
        else if (lang === 'js') {
          previewFrame.srcdoc = generateIframeDoc(code);
        }
        else if (lang === 'ts') {
          addRow('info', 'Транспиляция TS...');
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js');
          const js = window.ts.transpile(code, { target: 'ES2020' });
          previewFrame.srcdoc = generateIframeDoc(js);
        }
        else if (lang === 'py') {
          addRow('info', 'Инициализация Python (Pyodide)...');
          if(!window.pyodide) {
            await loadScript('https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js');
            window.pyodide = await loadPyodide();
            window.pyodide.setStdout({ batched: s => addRow('log', s) });
            window.pyodide.setStderr({ batched: s => addRow('error', s) });
          }
          await window.pyodide.runPythonAsync(code);
        }
        else if (lang === 'lua') {
          addRow('info', 'Инициализация Lua (Fengari)...');
          await loadScript('https://unpkg.com/fengari-web/dist/fengari-web.js');
          const L = fengari.lauxlib.luaL_newstate();
          fengari.lualib.luaL_openlibs(L);
          fengari.lua.lua_pushjsfunction(L, () => {
            const n = fengari.lua.lua_gettop(L); let parts=[];
            for(let i=1; i<=n; i++) parts.push(fengari.to_jsstring(fengari.lua.lua_tolstring(L,i)));
            addRow('log', parts.join(' ')); return 0;
          });
          fengari.lua.lua_setglobal(L, fengari.to_luastring('print'));
          fengari.lauxlib.luaL_dostring(L, fengari.to_luastring(code));
        }
      } catch (err) {
        addRow('error', String(err));
      }
    }

    $('#runBtn').onclick = run;
    
    // Слушаем сообщения из iframe
    window.addEventListener('message', e => {
      if(e.data?.type === 'console') {
        const text = e.data.args.map(x => typeof x === 'object' ? JSON.stringify(x, null, 2) : String(x)).join(' ');
        addRow(e.data.level, text);
      }
    });

    // Горячие клавиши для запуска
    editor.commands.addCommand({
      name: 'run',
      bindKey: {win: 'Ctrl-Enter',  mac: 'Command-Enter'},
      exec: () => run()
    });

    detectAndApplyMode();
  </script>
</body>
</html>
