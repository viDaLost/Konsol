<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Универсальная мобильная консоль — Mobile PRO Multi-File</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --bg-soft: #0d1220;
      --panel: rgba(17, 24, 39, 0.92);
      --panel-2: rgba(30, 41, 59, 0.78);
      --panel-3: #101827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --muted-2: #64748b;
      --line: rgba(148, 163, 184, 0.14);
      --accent: #7c3aed;
      --accent-2: #38bdf8;
      --accent-soft: rgba(124, 58, 237, 0.18);
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --radius-sm: 12px;
      --radius: 18px;
      --radius-lg: 28px;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f3f6fb;
      --bg-soft: #eaf0f8;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-2: rgba(241, 245, 249, 0.9);
      --panel-3: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --line: rgba(15, 23, 42, 0.10);
      --accent: #2563eb;
      --accent-2: #0891b2;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --shadow: 0 22px 70px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 32rem),
        radial-gradient(circle at 82% 12%, rgba(56, 189, 248, 0.16), transparent 26rem),
        linear-gradient(145deg, var(--bg), var(--bg-soft));
      color: var(--text);
      font: 14px/1.5 var(--sans);
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 12px;
      font-weight: 750;
      letter-spacing: -0.01em;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease, border 160ms ease;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.86;
    }

    button:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(56, 189, 248, 0.35);
      outline-offset: 2px;
    }

    select {
      max-width: 145px;
      padding: 0 34px 0 12px;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 18px,
        calc(100% - 13px) 18px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 20%, #ffffff 0 8%, transparent 9%),
        linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 20px;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.25);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(14px, 4vw, 17px);
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .brand-subtitle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .icon-btn {
      width: 42px;
      min-width: 42px;
      padding: 0;
      border-radius: 15px;
      font-size: 18px;
    }

    .run-btn {
      min-width: 98px;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
      gap: 10px;
      overflow: hidden;
    }

    .screen {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .screen-head,
    .file-tabs,
    .editor-tools,
    .console-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), transparent);
    }

    .file-tabs {
      background: var(--panel-3);
      justify-content: flex-start;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .file-tabs::-webkit-scrollbar { display: none; }

    .file-tab-btn {
      min-height: 32px;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 12px;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }
    .file-tab-btn.active {
      background: var(--panel-2);
      border-color: var(--line);
      color: var(--text);
    }

    .screen-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .file-pill {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
    }

    .tool-scroll {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tool-scroll::-webkit-scrollbar {
      display: none;
    }

    .mini-btn {
      min-height: 34px;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .ghost-btn {
      background: transparent;
    }

    .danger-btn {
      border-color: rgba(239, 68, 68, 0.26);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
    }

    .status-chip {
      min-height: 34px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .status-chip.clean {
      border-color: rgba(34, 197, 94, 0.22);
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
    }

    [data-theme="light"] .status-chip.clean {
      color: #15803d;
    }

    .status-chip.issue {
      border-color: rgba(245, 158, 11, 0.25);
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
    }

    .status-chip.error {
      border-color: rgba(239, 68, 68, 0.25);
      background: rgba(239, 68, 68, 0.13);
      color: #fca5a5;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #editor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      font-family: var(--mono);
    }

    .drop-hint {
      pointer-events: none;
      position: absolute;
      inset: 14px;
      z-index: 2;
      display: none;
      place-items: center;
      border: 2px dashed rgba(56, 189, 248, 0.45);
      border-radius: 22px;
      background: rgba(7, 10, 18, 0.72);
      color: #e0f2fe;
      font-weight: 850;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .editor-wrap.dragging .drop-hint {
      display: grid;
    }

    .problem-panel {
      flex: 0 0 auto;
      max-height: 34%;
      display: none;
      overflow: auto;
      border-top: 1px solid var(--line);
      background: var(--panel-3);
    }

    .problem-panel.visible {
      display: block;
    }

    .problem-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .problem-mark {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
      font-size: 13px;
    }

    .problem-card.error .problem-mark {
      background: rgba(239, 68, 68, 0.13);
      color: #fca5a5;
    }

    .problem-main {
      min-width: 0;
    }

    .problem-line {
      color: var(--muted);
      font: 12px var(--mono);
    }

    .problem-title {
      margin-top: 2px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .problem-action {
      min-height: 30px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 12px;
    }

    .console-body {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-rows: minmax(160px, 42%) 1fr;
      gap: 0;
    }

    .preview-box {
      min-height: 0;
      border-bottom: 1px solid var(--line);
      background: var(--panel-3);
      overflow: hidden;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .log {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      font-family: var(--mono);
      font-size: 12.5px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent),
        var(--bg);
      -webkit-overflow-scrolling: touch;
    }

    .empty-log {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted-2);
      text-align: center;
      padding: 26px;
      font-family: var(--sans);
    }

    .log-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      margin-bottom: 8px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      word-break: break-word;
    }

    [data-theme="light"] .log-row {
      background: rgba(15, 23, 42, 0.035);
    }

    .log-row.info {
      border-color: rgba(56, 189, 248, 0.20);
      background: rgba(56, 189, 248, 0.08);
    }

    .log-row.warn {
      border-color: rgba(245, 158, 11, 0.22);
      background: rgba(245, 158, 11, 0.08);
    }

    .log-row.error {
      border-color: rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.08);
    }

    .log-tag {
      align-self: start;
      border-radius: 999px;
      padding: 3px 7px;
      background: var(--panel-2);
      color: var(--muted);
      font: 10px var(--sans);
      font-weight: 900;
      text-transform: uppercase;
    }

    .log-row.error .log-tag { color: #fca5a5; }
    .log-row.warn .log-tag { color: #fbbf24; }
    .log-row.info .log-tag { color: #7dd3fc; }

    .log-text {
      min-width: 0;
      margin: 0;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .bottom-nav {
      display: none;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .tab-btn {
      position: relative;
      min-height: 48px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      flex-direction: column;
      gap: 1px;
    }

    .tab-btn.active {
      background: var(--panel-2);
      color: var(--text);
    }

    .tab-btn .badge-dot {
      position: absolute;
      top: 9px;
      right: 20%;
      width: 8px;
      height: 8px;
      display: none;
      border-radius: 50%;
      background: var(--err);
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.16);
    }

    .tab-btn.has-error .badge-dot { display: block; }

    .mobile-run {
      width: 54px;
      min-width: 54px;
      min-height: 48px;
      border-radius: 18px;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 20px;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }
    .sheet-backdrop.visible { display: block; }

    .problem-sheet {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 50;
      display: none;
      max-height: min(650px, 82vh);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .problem-sheet.visible { display: flex; flex-direction: column; }

    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), transparent);
    }

    .sheet-kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sheet-title {
      margin-top: 3px;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .sheet-close {
      width: 40px;
      min-width: 40px;
      border-radius: 15px;
      padding: 0;
      font-size: 18px;
    }

    .sheet-content {
      overflow: auto;
      padding: 14px 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .plain-block {
      margin: 0 0 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-2);
    }
    .plain-block b { display: block; margin-bottom: 4px; color: var(--text); }
    .plain-block p { margin: 0; color: var(--muted); }

    .code-sample {
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-radius: 16px;
      background: #020617;
      color: #e2e8f0;
      font: 12px/1.45 var(--mono);
    }
    [data-theme="light"] .code-sample { background: #0f172a; color: #e2e8f0; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(90px + env(safe-area-inset-bottom));
      z-index: 80;
      max-width: min(92vw, 420px);
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      font-weight: 800;
      transition: opacity 180ms ease, transform 180ms ease;
      text-align: center;
    }
    .toast.visible { opacity: 1; transform: translate(-50%, 0); }

    .hidden-input {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .app {
        gap: 8px;
        padding: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom));
      }

      .topbar { grid-template-columns: 1fr auto; border-radius: 24px; }
      .top-actions select, .top-actions .run-btn { display: none; }
      .layout { position: relative; display: block; }

      .screen {
        position: absolute;
        inset: 0;
        display: none;
        border-radius: 24px;
      }
      .screen.active { display: flex; }
      .bottom-nav { display: grid; }
      .screen-head, .file-tabs, .editor-tools, .console-tools { padding: 8px; }
      .screen-head { flex-wrap: wrap; }
      .file-pill { max-width: 52vw; }
      .editor-tools { align-items: stretch; flex-direction: column; }
      .editor-tools > .tool-scroll { width: 100%; }
      .status-chip { width: 100%; justify-content: center; }
      .console-body { grid-template-rows: minmax(110px, 36%) 1fr; }
      .preview-box { min-height: 110px; }
      .mini-btn { min-height: 38px; }
    }

    @media (max-width: 420px) {
      .brand-mark { width: 38px; height: 38px; border-radius: 14px; }
      .brand-title { font-size: 14px; }
      .brand-subtitle { font-size: 11px; }
      .topbar { padding: 8px; }
      .icon-btn { width: 38px; min-width: 38px; min-height: 38px; border-radius: 14px; }
      .problem-card { grid-template-columns: auto 1fr; }
      .problem-action { grid-column: 1 / -1; }
    }

    @media (min-width: 981px) { .screen { display: flex; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">⌘</div>
        <div class="brand-text">
          <span class="brand-title">Мобильная консоль кода</span>
          <span class="brand-subtitle"><i class="pulse" aria-hidden="true"></i><span id="statusText">Анализатор включён</span></span>
        </div>
      </div>

      <div class="top-actions">
        <select id="langOverride" aria-label="Выбрать язык кода" style="display:none;">
          <option value="auto">Авто</option>
        </select>
        <button class="icon-btn" id="themeBtn" type="button" title="Сменить тему" aria-label="Сменить тему">🌓</button>
        <button class="run-btn" id="runBtn" type="button">▶ Запуск</button>
      </div>
    </header>

    <main class="layout" id="layout">
      <section class="screen active" id="tab-editor" aria-label="Редактор кода">
        <div class="screen-head">
          <div class="screen-title">📝 Проект: <span class="file-pill" id="fileNamePill">index.html</span></div>
          <div class="tool-scroll">
            <button class="mini-btn" id="importBtn" type="button">📂 Импорт</button>
          </div>
        </div>

        <div class="file-tabs" id="fileTabs">
          <button class="file-tab-btn active" data-file="index.html" type="button">index.html</button>
          <button class="file-tab-btn" data-file="style.css" type="button">style.css</button>
          <button class="file-tab-btn" data-file="app.js" type="button">app.js</button>
        </div>

        <div class="editor-tools">
          <div class="tool-scroll">
            <button class="mini-btn" id="btnCopy" type="button">📋 Копировать</button>
            <button class="mini-btn" id="btnCut" type="button">✂ Вырезать</button>
            <button class="mini-btn" id="btnPaste" type="button">📄 Вставить</button>
            <button class="mini-btn danger-btn" id="btnClearCode" type="button">🗑 Сброс</button>
          </div>
          <button class="status-chip clean" id="lintStatus" type="button">✨ Код чист</button>
        </div>

        <div class="editor-wrap" id="editorWrap">
          <div id="editor"></div>
          <div class="drop-hint">Перетащите файлы сюда (.html, .css, .js)</div>
        </div>

        <div class="problem-panel" id="problemPanel"></div>
      </section>

      <section class="screen" id="tab-output" aria-label="Консоль вывода">
        <div class="screen-head">
          <div class="screen-title">📟 Консоль и превью</div>
          <div class="tool-scroll">
            <button class="mini-btn" id="togglePreview" type="button">👁 Превью</button>
            <button class="mini-btn" id="externalPreview" type="button" style="background: var(--accent-soft); font-weight:bold;">↗ Вкладка</button>
            <button class="mini-btn" id="clearConsole" type="button">Очистить</button>
          </div>
        </div>

        <div class="console-body">
          <div class="preview-box" id="previewBox">
            <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
          </div>
          <div class="log" id="log">
            <div class="empty-log">Здесь появятся сообщения из console.log, ошибки запуска и результат импорта файлов.</div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Нижняя навигация">
      <button class="tab-btn active" data-target="tab-editor" type="button">📝<span>Код</span></button>
      <button class="tab-btn" data-target="tab-output" id="outputNavBtn" type="button">📟<span>Консоль</span><i class="badge-dot"></i></button>
      <button class="mobile-run" id="mobileRunBtn" type="button" aria-label="Запустить код">▶</button>
    </nav>
  </div>

  <input class="hidden-input" id="fileInput" type="file" multiple accept=".html,.htm,.css,.js" />

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <aside class="problem-sheet" id="problemSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-head">
      <div>
        <div class="sheet-kicker" id="sheetKicker">Проблема</div>
        <div class="sheet-title" id="sheetTitle">Что не так в коде</div>
      </div>
      <button class="sheet-close" id="sheetClose" type="button" aria-label="Закрыть">×</button>
    </div>
    <div class="sheet-content" id="sheetContent"></div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>

  <script>
    const $ = selector => document.querySelector(selector);
    const $$ = selector => [...document.querySelectorAll(selector)];

    const STORAGE = {
      theme: 'ucc_mobile_pro_theme',
      preview: 'ucc_mobile_pro_preview_visible',
      filePrefix: 'ucc_multi_file_'
    };

    // Файловое состояние по умолчанию
    const VFS = {
      'index.html': localStorage.getItem(STORAGE.filePrefix + 'index.html') || `<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой проект</title>
</head>
<body>
  <div class="card">
    <h1>Мультифайловый проект 📂</h1>
    <p>Отредактируйте style.css и app.js, затем нажмите «Запуск».</p>
  </div>
</body>
</html>`,
      'style.css': localStorage.getItem(STORAGE.filePrefix + 'style.css') || `body {
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #fff;
}
.card {
  text-align: center;
  padding: 30px;
  background: #1e293b;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}`,
      'app.js': localStorage.getItem(STORAGE.filePrefix + 'app.js') || `console.log("Скрипт app.js успешно подключен!");
// Можно писать интерактивную логику тут`
    };

    let currentFile = 'index.html';

    const logEl = $('#log');
    const previewFrame = $('#previewFrame');
    const previewBox = $('#previewBox');
    const problemPanel = $('#problemPanel');
    const lintStatus = $('#lintStatus');
    const outputNavBtn = $('#outputNavBtn');
    const fileInput = $('#fileInput');
    const fileNamePill = $('#fileNamePill');
    const editorWrap = $('#editorWrap');

    let activeIssues = [];
    let lintErrorsCount = 0;
    let lintTimer = 0;
    let toastTimer = 0;

    const editor = ace.edit('editor');
    editor.setOptions({
      fontSize: window.innerWidth < 480 ? '13.5px' : '14px',
      showPrintMargin: false,
      wrap: true,
      useWorker: false,
      highlightActiveLine: true,
      scrollPastEnd: 0.22,
      tabSize: 2,
      useSoftTabs: true,
      enableBasicAutocompletion: true,
      enableLiveAutocompletion: false
    });
    editor.renderer.setPadding(12);
    editor.renderer.setScrollMargin(10, 10, 10, 10);

    function showToast(text) {
      const toast = $('#toast');
      toast.textContent = text;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2100);
    }

    function escapeHtml(value) {
      return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function readableBytes(bytes) {
      if (bytes < 1024) return bytes + ' Б';
      return (bytes / 1024).toFixed(1) + ' КБ';
    }

    function switchTab(targetId) {
      $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.target === targetId));
      $$('.screen').forEach(screen => screen.classList.toggle('active', screen.id === targetId));
      if (targetId === 'tab-editor') {
        setTimeout(() => { editor.resize(); editor.focus(); }, 60);
      }
    }

    $$('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.target)));

    function applyTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      editor.setTheme(isDark ? 'ace/theme/tomorrow_night_eighties' : 'ace/theme/chrome');
    }

    const savedTheme = localStorage.getItem(STORAGE.theme);
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    applyTheme();

    $('#themeBtn').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(STORAGE.theme, next);
      applyTheme();
      showToast(next === 'dark' ? 'Тёмная тема включена' : 'Светлая тема включена');
    });

    // Управление табами VFS файлов
    function switchFile(fileName) {
      // Сохраняем текущее состояние в буфер
      VFS[currentFile] = editor.getValue();
      localStorage.setItem(STORAGE.filePrefix + currentFile, VFS[currentFile]);

      currentFile = fileName;
      fileNamePill.textContent = fileName;
      
      $$('.file-tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.file === fileName));
      
      editor.setValue(VFS[fileName], -1);
      
      // Выставляем правильный режим подсветки
      let mode = 'html';
      if (fileName.endsWith('.css')) mode = 'css';
      if (fileName.endsWith('.js')) mode = 'javascript';
      editor.session.setMode('ace/mode/' + mode);
      
      triggerLinterDirectly();
    }

    $$('.file-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchFile(btn.dataset.file));
    });

    function addRow(kind, text) {
      const empty = logEl.querySelector('.empty-log');
      if (empty) empty.remove();

      const names = { log: 'лог', info: 'инфо', warn: 'внимание', error: 'ошибка' };
      const row = document.createElement('div');
      row.className = 'log-row ' + (kind || 'log');
      row.innerHTML = '<span class="log-tag">' + (names[kind] || kind || 'лог') + '</span><pre class="log-text">' + escapeHtml(text) + '</pre>';
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;

      if (kind === 'error') outputNavBtn.classList.add('has-error');
    }

    $('#clearConsole').addEventListener('click', () => {
      logEl.innerHTML = '<div class="empty-log">Консоль очищена. Запустите проект.</div>';
      outputNavBtn.classList.remove('has-error');
    });

    $('#togglePreview').addEventListener('click', () => {
      const hidden = previewBox.style.display === 'none';
      previewBox.style.display = hidden ? '' : 'none';
      localStorage.setItem(STORAGE.preview, hidden ? '1' : '0');
      showToast(hidden ? 'Превью включено' : 'Превью скрыто');
    });

    if (localStorage.getItem(STORAGE.preview) === '0') previewBox.style.display = 'none';

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Скопировано');
      } catch (error) {
        addRow('error', 'Нет доступа к буферу обмена.');
      }
    }

    $('#btnCopy').addEventListener('click', () => {
      copyToClipboard(editor.getSelectedText() || editor.getValue());
      editor.focus();
    });

    $('#btnCut').addEventListener('click', async () => {
      const text = editor.getSelectedText();
      if (!text) { showToast('Сначала выделите фрагмент'); editor.focus(); return; }
      await copyToClipboard(text);
      editor.session.replace(editor.selection.getRange(), '');
      editor.focus();
    });

    $('#btnPaste').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        editor.insert(text);
        showToast('Вставлено');
      } catch (error) { addRow('error', 'Нет доступа к буферу.'); }
      editor.focus();
    });

    // Сброс текущего файла
    $('#btnClearCode').addEventListener('click', () => {
      if (!editor.getValue().trim()) return;
      if (confirm(`Стереть содержимое файла ${currentFile}?`)) {
        editor.setValue('', -1);
        VFS[currentFile] = '';
        localStorage.removeItem(STORAGE.filePrefix + currentFile);
        showToast('Файл очищен');
      }
      editor.focus();
    });

    function makeIssue({ level = 'warn', line = 1, title, message, simple, why, fix, example }) {
      return { level, line: Math.max(1, line || 1), title, message: message || title, simple: simple || message || title, why: why || '', fix: fix || '', example: example || '' };
    }

    function runLinter(code, lang) {
      const issues = [];
      const lines = code.split('\n');

      const whileTrueLine = lines.findIndex(line => /\bwhile\s*\(\s*true\s*\)/.test(line)) + 1;
      if (whileTrueLine && !/\bbreak\b/.test(code)) {
        issues.push(makeIssue({ level: 'error', line: whileTrueLine, title: 'Бесконечный цикл while(true)', simple: 'Код может зависнуть.' }));
      }

      if (['javascript', 'html'].includes(lang)) {
        lines.forEach((line, index) => {
          const rowNum = index + 1;
          const trimmed = line.trim();
          if (/\bvar\b/.test(trimmed) && !/^\s*(\/\/|\*)/.test(trimmed)) {
            issues.push(makeIssue({ line: rowNum, title: 'Старое объявление var', simple: 'Используйте let или const.' }));
          }
        });
      }

      activeIssues = issues;
      lintErrorsCount = issues.filter(issue => issue.level === 'error').length;
      renderIssues();
      renderAceAnnotations(issues);
    }

    function renderAceAnnotations(issues) {
      editor.session.setAnnotations(issues.map(issue => ({
        row: Math.max(0, issue.line - 1), column: 0, text: issue.title, type: issue.level === 'error' ? 'error' : 'warning'
      })));
    }

    function renderIssues() {
      problemPanel.innerHTML = '';
      if (!activeIssues.length) {
        lintStatus.className = 'status-chip clean'; lintStatus.textContent = '✨ Код чист';
        problemPanel.classList.remove('visible'); return;
      }
      const hasError = activeIssues.some(issue => issue.level === 'error');
      lintStatus.className = 'status-chip ' + (hasError ? 'error' : 'issue');
      lintStatus.textContent = '⚠️ Проблема · ' + activeIssues.length;

      activeIssues.forEach((issue, index) => {
        const card = document.createElement('div');
        card.className = 'problem-card ' + (issue.level === 'error' ? 'error' : 'warn');
        card.innerHTML = `<div class="problem-mark">!</div><div class="problem-main"><div class="problem-line">Строка ${issue.line}</div><div class="problem-title">${escapeHtml(issue.title)}</div></div>`;
        problemPanel.appendChild(card);
      });
    }

    function triggerLinterDirectly() {
      let lang = 'html';
      if (currentFile.endsWith('.css')) lang = 'css';
      if (currentFile.endsWith('.js')) lang = 'javascript';
      runLinter(editor.getValue(), lang);
    }

    editor.session.on('change', () => {
      VFS[currentFile] = editor.getValue();
      localStorage.setItem(STORAGE.filePrefix + currentFile, VFS[currentFile]);
      clearTimeout(lintTimer);
      lintTimer = setTimeout(triggerLinterDirectly, 250);
    });

    // Обработка импорта (нескольких файлов разом)
    async function importFiles(filesList) {
      if (!filesList.length) return;
      let targetFile = 'index.html';

      for (let file of filesList) {
        if (VFS.hasOwnProperty(file.name)) {
          try {
            const text = await file.text();
            VFS[file.name] = text;
            localStorage.setItem(STORAGE.filePrefix + file.name, text);
            addRow('info', `Файл «${file.name}» импортирован (${readableBytes(file.size)}).`);
            targetFile = file.name; 
          } catch(e) {
            addRow('error', `Ошибка чтения файла ${file.name}`);
          }
        } else {
          addRow('warn', `Файл «${file.name}» пропущен. Разрешены: index.html, style.css, app.js`);
        }
      }
      showToast('Импорт завершен');
      switchFile(targetFile);
      switchTab('tab-editor');
    }

    $('#importBtn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', event => importFiles(event.target.files));

    ;['dragenter', 'dragover'].forEach(name => {
      editorWrap.addEventListener(name, event => { event.preventDefault(); editorWrap.classList.add('dragging'); });
    });
    ;['dragleave', 'drop'].forEach(name => {
      editorWrap.addEventListener(name, event => {
        event.preventDefault();
        if (name === 'drop') importFiles(event.dataTransfer.files);
        editorWrap.classList.remove('dragging');
      });
    });

    // Скрипт захвата логов для iframe
    function buildConsoleCaptureScript() {
      return `<script>
        (function () {
          function safe(value) {
            try {
              if (typeof value === 'string') return value;
              return JSON.stringify(value, null, 2);
            } catch (error) { return String(value); }
          }
          function send(level, args) {
            const payload = { type: 'mobile-console', level: level, args: Array.prototype.slice.call(args).map(safe) };
            if (window.opener) { window.opener.postMessage(payload, '*'); }
            parent.postMessage(payload, '*');
          }
          ['log', 'info', 'warn', 'error'].forEach(function (level) {
            var original = console[level];
            console[level] = function () {
              send(level, arguments);
              if (original) original.apply(console, arguments);
            };
          });
          window.onerror = function (message, source, line, column) {
            send('error', [String(message) + ' — строка ' + line]);
          };
        })();
      <\/script>`;
    }

    // Сборщик проекта (Bundle) из VFS
    function buildProjectBundle() {
      // Синхронизируем текущий открытый редактор
      VFS[currentFile] = editor.getValue();

      let html = VFS['index.html'];
      const css = VFS['style.css'];
      const js = VFS['app.js'];

      const captureScript = buildConsoleCaptureScript();

      // Инжектируем перехватчик логов
      if (/<head[^>]*>/i.test(html)) {
        html = html.replace(/<head([^>]*)>/i, '<head$1>' + captureScript);
      } else {
        html = captureScript + html;
      }

      // Инжектируем стили, если они написаны и нет явного импорта style.css (или просто добавляем в head)
      if (css.trim()) {
        const styleTag = `<style data-bundle="true">\\n${css}\\n</style>`;
        if (/<\\/head>/i.test(html)) {
          html = html.replace(/<\\/head>/i, styleTag + '\\n</head>');
        } else {
          html += styleTag;
        }
      }

      // Инжектируем скрипты
      if (js.trim()) {
        const scriptTag = `<script data-bundle="true">\\n${js}\\n<\/script>`;
        if (/<\\/body>/i.test(html)) {
          html = html.replace(/<\\/body>/i, scriptTag + '\\n</body>');
        } else {
          html += scriptTag;
        }
      }

      return html;
    }

    function run() {
      $('#clearConsole').click();
      switchTab('tab-output');

      try {
        const bundle = buildProjectBundle();
        previewBox.style.display = '';
        previewFrame.srcdoc = bundle;
        addRow('info', 'Проект собран: стили из style.css и скрипты из app.js объединены в index.html');
      } catch (error) {
        addRow('error', String(error));
      }
    }

    // Открытие превью в отдельной вкладке
    $('#externalPreview').addEventListener('click', () => {
      const bundle = buildProjectBundle();
      
      // Создаем Blob c HTML-контентом, чтобы корректно открывался любой объем данных
      const blob = new Blob([bundle], { type: 'text/html;charset=utf-8' });
      const blobUrl = URL.createObjectURL(blob);
      
      const newWindow = window.open(blobUrl, '_blank');
      if (newWindow) {
        addRow('info', 'Превью проекта открыто на новой странице.');
        showToast('Открыто в новой вкладке');
      } else {
        addRow('error', 'Браузер заблокировал всплывающее окно. Разрешите всплывающие окна для приложения.');
      }
    });

    $('#runBtn').addEventListener('click', run);
    $('#mobileRunBtn').addEventListener('click', run);

    // Слушатель событий логирования как из iframe, так и из дочерней вкладки
    window.addEventListener('message', event => {
      if (event.data && event.data.type === 'mobile-console') {
        addRow(event.data.level || 'log', (event.data.args || []).join(' '));
      }
    });

    window.addEventListener('resize', () => {
      editor.setFontSize(window.innerWidth < 480 ? 13.5 : 14);
      editor.resize();
    });

    // Стартовая инициализация
    switchFile('index.html');
  </script>
</body>
</html>
