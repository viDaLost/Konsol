<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Универсальная мобильная консоль — Mobile PRO</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --bg-soft: #0d1220;
      --panel: rgba(17, 24, 39, 0.92);
      --panel-2: rgba(30, 41, 59, 0.78);
      --panel-3: #101827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --muted-2: #64748b;
      --line: rgba(148, 163, 184, 0.14);
      --accent: #7c3aed;
      --accent-2: #38bdf8;
      --accent-soft: rgba(124, 58, 237, 0.18);
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --radius-sm: 12px;
      --radius: 18px;
      --radius-lg: 28px;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f3f6fb;
      --bg-soft: #eaf0f8;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-2: rgba(241, 245, 249, 0.9);
      --panel-3: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --line: rgba(15, 23, 42, 0.10);
      --accent: #2563eb;
      --accent-2: #0891b2;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --shadow: 0 22px 70px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 32rem),
        radial-gradient(circle at 82% 12%, rgba(56, 189, 248, 0.16), transparent 26rem),
        linear-gradient(145deg, var(--bg), var(--bg-soft));
      color: var(--text);
      font: 14px/1.5 var(--sans);
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 12px;
      font-weight: 750;
      letter-spacing: -0.01em;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease, border 160ms ease;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.86;
    }

    button:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(56, 189, 248, 0.35);
      outline-offset: 2px;
    }

    select {
      max-width: 145px;
      padding: 0 34px 0 12px;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 18px,
        calc(100% - 13px) 18px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 20%, #ffffff 0 8%, transparent 9%),
        linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 20px;
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.25);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(14px, 4vw, 17px);
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .brand-subtitle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.12);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .icon-btn {
      width: 42px;
      min-width: 42px;
      padding: 0;
      border-radius: 15px;
      font-size: 18px;
    }

    .run-btn {
      min-width: 98px;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
      gap: 10px;
      overflow: hidden;
    }

    .screen {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .screen-head,
    .editor-tools,
    .console-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), transparent);
    }

    .screen-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .file-pill {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
    }

    .file-tabs {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 8px 9px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .file-tabs::-webkit-scrollbar {
      display: none;
    }

    .file-tabs.visible {
      display: flex;
    }

    .file-tab {
      min-height: 34px;
      max-width: 190px;
      flex: 0 0 auto;
      justify-content: flex-start;
      border-radius: 999px;
      padding: 7px 11px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .file-tab.active {
      border-color: rgba(56, 189, 248, 0.30);
      background: var(--accent-soft);
      color: var(--text);
    }

    .file-tab-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-tab-ext {
      opacity: 0.72;
      font-size: 11px;
    }

    .project-hint {
      flex: 0 0 auto;
      margin-left: 2px;
      color: var(--muted-2);
      font-size: 11px;
      white-space: nowrap;
    }

    .tool-scroll {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tool-scroll::-webkit-scrollbar {
      display: none;
    }

    .mini-btn {
      min-height: 34px;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .ghost-btn {
      background: transparent;
    }

    .danger-btn {
      border-color: rgba(239, 68, 68, 0.26);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
    }

    .status-chip {
      min-height: 34px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .status-chip.clean {
      border-color: rgba(34, 197, 94, 0.22);
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
    }

    [data-theme="light"] .status-chip.clean {
      color: #15803d;
    }

    .status-chip.issue {
      border-color: rgba(245, 158, 11, 0.25);
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
    }

    .status-chip.error {
      border-color: rgba(239, 68, 68, 0.25);
      background: rgba(239, 68, 68, 0.13);
      color: #fca5a5;
    }

    .editor-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #editor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      font-family: var(--mono);
    }

    .drop-hint {
      pointer-events: none;
      position: absolute;
      inset: 14px;
      z-index: 2;
      display: none;
      place-items: center;
      border: 2px dashed rgba(56, 189, 248, 0.45);
      border-radius: 22px;
      background: rgba(7, 10, 18, 0.72);
      color: #e0f2fe;
      font-weight: 850;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .editor-wrap.dragging .drop-hint {
      display: grid;
    }

    .problem-panel {
      flex: 0 0 auto;
      max-height: 34%;
      display: none;
      overflow: auto;
      border-top: 1px solid var(--line);
      background: var(--panel-3);
    }

    .problem-panel.visible {
      display: block;
    }

    .problem-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .problem-mark {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
      font-size: 13px;
    }

    .problem-card.error .problem-mark {
      background: rgba(239, 68, 68, 0.13);
      color: #fca5a5;
    }

    .problem-main {
      min-width: 0;
    }

    .problem-line {
      color: var(--muted);
      font: 12px var(--mono);
    }

    .problem-title {
      margin-top: 2px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .problem-action {
      min-height: 30px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 12px;
    }

    .console-body {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-rows: minmax(160px, 42%) 1fr;
      gap: 0;
    }

    .preview-box {
      min-height: 0;
      border-bottom: 1px solid var(--line);
      background: var(--panel-3);
      overflow: hidden;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .log {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      font-family: var(--mono);
      font-size: 12.5px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent),
        var(--bg);
      -webkit-overflow-scrolling: touch;
    }

    .empty-log {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted-2);
      text-align: center;
      padding: 26px;
      font-family: var(--sans);
    }

    .log-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      margin-bottom: 8px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      word-break: break-word;
    }

    [data-theme="light"] .log-row {
      background: rgba(15, 23, 42, 0.035);
    }

    .log-row.info {
      border-color: rgba(56, 189, 248, 0.20);
      background: rgba(56, 189, 248, 0.08);
    }

    .log-row.warn {
      border-color: rgba(245, 158, 11, 0.22);
      background: rgba(245, 158, 11, 0.08);
    }

    .log-row.error {
      border-color: rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.08);
    }

    .log-tag {
      align-self: start;
      border-radius: 999px;
      padding: 3px 7px;
      background: var(--panel-2);
      color: var(--muted);
      font: 10px var(--sans);
      font-weight: 900;
      text-transform: uppercase;
    }

    .log-row.error .log-tag {
      color: #fca5a5;
    }

    .log-row.warn .log-tag {
      color: #fbbf24;
    }

    .log-row.info .log-tag {
      color: #7dd3fc;
    }

    .log-text {
      min-width: 0;
      margin: 0;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .bottom-nav {
      display: none;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .tab-btn {
      position: relative;
      min-height: 48px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      flex-direction: column;
      gap: 1px;
    }

    .tab-btn.active {
      background: var(--panel-2);
      color: var(--text);
    }

    .tab-btn .badge-dot {
      position: absolute;
      top: 9px;
      right: 20%;
      width: 8px;
      height: 8px;
      display: none;
      border-radius: 50%;
      background: var(--err);
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.16);
    }

    .tab-btn.has-error .badge-dot {
      display: block;
    }

    .mobile-run {
      width: 54px;
      min-width: 54px;
      min-height: 48px;
      border-radius: 18px;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 20px;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    .sheet-backdrop.visible {
      display: block;
    }

    .problem-sheet {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 50;
      display: none;
      max-height: min(650px, 82vh);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .problem-sheet.visible {
      display: flex;
      flex-direction: column;
    }

    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), transparent);
    }

    .sheet-kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sheet-title {
      margin-top: 3px;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .sheet-close {
      width: 40px;
      min-width: 40px;
      border-radius: 15px;
      padding: 0;
      font-size: 18px;
    }

    .sheet-content {
      overflow: auto;
      padding: 14px 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .plain-block {
      margin: 0 0 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel-2);
    }

    .plain-block b {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    .plain-block p {
      margin: 0;
      color: var(--muted);
    }

    .code-sample {
      margin: 0;
      padding: 12px;
      overflow: auto;
      border-radius: 16px;
      background: #020617;
      color: #e2e8f0;
      font: 12px/1.45 var(--mono);
    }

    [data-theme="light"] .code-sample {
      background: #0f172a;
      color: #e2e8f0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(90px + env(safe-area-inset-bottom));
      z-index: 80;
      max-width: min(92vw, 420px);
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      font-weight: 800;
      transition: opacity 180ms ease, transform 180ms ease;
      text-align: center;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .hidden-input {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .app {
        gap: 8px;
        padding: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom));
      }

      .topbar {
        grid-template-columns: 1fr auto;
        border-radius: 24px;
      }

      .top-actions select,
      .top-actions .run-btn {
        display: none;
      }

      .layout {
        position: relative;
        display: block;
      }

      .screen {
        position: absolute;
        inset: 0;
        display: none;
        border-radius: 24px;
      }

      .screen.active {
        display: flex;
      }

      .bottom-nav {
        display: grid;
      }

      .screen-head,
      .editor-tools,
      .console-tools {
        padding: 8px;
      }


      .file-tabs {
        padding: 7px 8px;
      }

      .file-tab {
        max-width: 62vw;
        min-height: 36px;
      }

      .screen-head {
        flex-wrap: wrap;
      }

      .file-pill {
        max-width: 52vw;
      }

      .editor-tools {
        align-items: stretch;
        flex-direction: column;
      }

      .editor-tools > .tool-scroll {
        width: 100%;
      }

      .status-chip {
        width: 100%;
        justify-content: center;
      }

      .console-body {
        grid-template-rows: minmax(110px, 36%) 1fr;
      }

      .preview-box {
        min-height: 110px;
      }

      .mini-btn {
        min-height: 38px;
      }
    }

    @media (max-width: 420px) {
      .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 14px;
      }

      .brand-title {
        font-size: 14px;
      }

      .brand-subtitle {
        font-size: 11px;
      }

      .topbar {
        padding: 8px;
      }

      .icon-btn {
        width: 38px;
        min-width: 38px;
        min-height: 38px;
        border-radius: 14px;
      }

      .problem-card {
        grid-template-columns: auto 1fr;
      }

      .problem-action {
        grid-column: 1 / -1;
      }
    }

    @media (min-width: 981px) {
      .screen {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">⌘</div>
        <div class="brand-text">
          <span class="brand-title">Мобильная консоль кода</span>
          <span class="brand-subtitle"><i class="pulse" aria-hidden="true"></i><span id="statusText">Анализатор включён</span></span>
        </div>
      </div>

      <div class="top-actions">
        <select id="langOverride" aria-label="Выбрать язык кода">
          <option value="auto">Авто</option>
          <option value="html">HTML/CSS/JS</option>
          <option value="jsx">React JSX</option>
          <option value="js">JavaScript</option>
          <option value="ts">TypeScript</option>
          <option value="py">Python</option>
        </select>
        <button class="icon-btn" id="themeBtn" type="button" title="Сменить тему" aria-label="Сменить тему">🌓</button>
        <button class="run-btn" id="runBtn" type="button">▶ Запуск</button>
      </div>
    </header>

    <main class="layout" id="layout">
      <section class="screen active" id="tab-editor" aria-label="Редактор кода">
        <div class="screen-head">
          <div class="screen-title">📝 Редактор <span class="file-pill" id="fileNamePill">без файла</span></div>
          <div class="tool-scroll">
            <button class="mini-btn" id="importBtn" type="button">📂 Импорт</button>
            <button class="mini-btn ghost-btn" id="desktopLangBtn" type="button">Язык</button>
          </div>
        </div>

        <div class="editor-tools">
          <div class="tool-scroll">
            <button class="mini-btn" id="btnCopy" type="button">📋 Копировать</button>
            <button class="mini-btn" id="btnCut" type="button">✂ Вырезать</button>
            <button class="mini-btn" id="btnPaste" type="button">📄 Вставить</button>
            <button class="mini-btn danger-btn" id="btnClearCode" type="button">🗑 Сброс</button>
          </div>
          <button class="status-chip clean" id="lintStatus" type="button">✨ Код чист</button>
        </div>

        <div class="file-tabs" id="fileTabs" aria-label="Файлы проекта"></div>

        <div class="editor-wrap" id="editorWrap">
          <div id="editor"></div>
          <div class="drop-hint">Перетащите один или несколько файлов<br />и приложение соберёт их в проект</div>
        </div>

        <div class="problem-panel" id="problemPanel"></div>
      </section>

      <section class="screen" id="tab-output" aria-label="Консоль вывода">
        <div class="screen-head">
          <div class="screen-title">📟 Консоль и превью</div>
          <div class="tool-scroll">
            <button class="mini-btn" id="togglePreview" type="button">👁 Превью</button>
            <button class="mini-btn" id="openPreviewPage" type="button">↗ Отдельно</button>
            <button class="mini-btn" id="clearConsole" type="button">Очистить</button>
          </div>
        </div>

        <div class="console-body">
          <div class="preview-box" id="previewBox">
            <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
          </div>
          <div class="log" id="log">
            <div class="empty-log">Здесь появятся сообщения из console.log, ошибки запуска и результат импорта файлов.</div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Нижняя навигация">
      <button class="tab-btn active" data-target="tab-editor" type="button">📝<span>Код</span></button>
      <button class="tab-btn" data-target="tab-output" id="outputNavBtn" type="button">📟<span>Консоль</span><i class="badge-dot"></i></button>
      <button class="mobile-run" id="mobileRunBtn" type="button" aria-label="Запустить код">▶</button>
    </nav>
  </div>

  <input class="hidden-input" id="fileInput" type="file" multiple accept=".html,.htm,.css,.js,.mjs,.cjs,.jsx,.ts,.tsx,.py,.json,.txt,.md,.xml,.svg" />

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <aside class="problem-sheet" id="problemSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-head">
      <div>
        <div class="sheet-kicker" id="sheetKicker">Проблема</div>
        <div class="sheet-title" id="sheetTitle">Что не так в коде</div>
      </div>
      <button class="sheet-close" id="sheetClose" type="button" aria-label="Закрыть">×</button>
    </div>
    <div class="sheet-content" id="sheetContent"></div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>

  <script>
    const $ = selector => document.querySelector(selector);
    const $$ = selector => [...document.querySelectorAll(selector)];

    const STORAGE = {
      theme: 'ucc_mobile_pro_theme',
      code: 'ucc_mobile_pro_code',
      lang: 'ucc_mobile_pro_lang',
      preview: 'ucc_mobile_pro_preview_visible',
      project: 'ucc_mobile_pro_project_files'
    };

    const logEl = $('#log');
    const previewFrame = $('#previewFrame');
    const previewBox = $('#previewBox');
    const problemPanel = $('#problemPanel');
    const lintStatus = $('#lintStatus');
    const outputNavBtn = $('#outputNavBtn');
    const fileInput = $('#fileInput');
    const fileNamePill = $('#fileNamePill');
    const editorWrap = $('#editorWrap');
    const fileTabs = $('#fileTabs');

    let activeIssues = [];
    let lintErrorsCount = 0;
    let lintTimer = 0;
    let toastTimer = 0;
    let lastImportedFileName = '';
    let projectFiles = new Map();
    let activeFileName = '';
    let isSwitchingFile = false;
    let activePreviewUrl = '';
    let externalPreviewUrl = '';

    const editor = ace.edit('editor');
    editor.setOptions({
      fontSize: window.innerWidth < 480 ? '13.5px' : '14px',
      showPrintMargin: false,
      wrap: true,
      useWorker: false,
      highlightActiveLine: true,
      scrollPastEnd: 0.22,
      tabSize: 2,
      useSoftTabs: true,
      enableBasicAutocompletion: true,
      enableLiveAutocompletion: false
    });
    editor.renderer.setPadding(12);
    editor.renderer.setScrollMargin(10, 10, 10, 10);

    function showToast(text) {
      const toast = $('#toast');
      toast.textContent = text;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2100);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function readableBytes(bytes) {
      if (bytes < 1024) return bytes + ' Б';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
      return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
    }

    function switchTab(targetId) {
      $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.target === targetId));
      $$('.screen').forEach(screen => screen.classList.toggle('active', screen.id === targetId));
      if (targetId === 'tab-editor') {
        setTimeout(() => {
          editor.resize();
          editor.focus();
        }, 60);
      }
    }

    $$('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.target)));

    function applyTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      editor.setTheme(isDark ? 'ace/theme/tomorrow_night_eighties' : 'ace/theme/chrome');
    }

    const savedTheme = localStorage.getItem(STORAGE.theme);
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    applyTheme();

    $('#themeBtn').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(STORAGE.theme, next);
      applyTheme();
      showToast(next === 'dark' ? 'Тёмная тема включена' : 'Светлая тема включена');
    });

    const savedLang = localStorage.getItem(STORAGE.lang);
    if (savedLang) $('#langOverride').value = savedLang;

    $('#desktopLangBtn').addEventListener('click', () => {
      const select = $('#langOverride');
      select.focus();
      if (typeof select.showPicker === 'function') select.showPicker();
      showToast('Язык можно выбрать сверху справа');
    });

    function addRow(kind, text) {
      const empty = logEl.querySelector('.empty-log');
      if (empty) empty.remove();

      const names = {
        log: 'лог',
        info: 'инфо',
        warn: 'внимание',
        error: 'ошибка'
      };

      const row = document.createElement('div');
      row.className = 'log-row ' + (kind || 'log');
      row.innerHTML = '<span class="log-tag">' + (names[kind] || kind || 'лог') + '</span><pre class="log-text">' + escapeHtml(text) + '</pre>';
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;

      if (kind === 'error') outputNavBtn.classList.add('has-error');
    }

    $('#clearConsole').addEventListener('click', () => {
      logEl.innerHTML = '<div class="empty-log">Консоль очищена. Запустите код или импортируйте файл, чтобы увидеть новые сообщения.</div>';
      outputNavBtn.classList.remove('has-error');
    });

    $('#togglePreview').addEventListener('click', () => {
      const hidden = previewBox.style.display === 'none';
      previewBox.style.display = hidden ? '' : 'none';
      localStorage.setItem(STORAGE.preview, hidden ? '1' : '0');
      showToast(hidden ? 'Превью включено' : 'Превью скрыто');
    });

    if (localStorage.getItem(STORAGE.preview) === '0') previewBox.style.display = 'none';

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Скопировано');
      } catch (error) {
        addRow('error', 'Нет доступа к буферу обмена. Попробуйте выделить текст вручную.');
      }
    }

    $('#btnCopy').addEventListener('click', () => {
      const text = editor.getSelectedText() || editor.getValue();
      copyToClipboard(text);
      editor.focus();
    });

    $('#btnCut').addEventListener('click', async () => {
      const text = editor.getSelectedText();
      if (!text) {
        showToast('Сначала выделите фрагмент');
        editor.focus();
        return;
      }
      await copyToClipboard(text);
      editor.session.replace(editor.selection.getRange(), '');
      editor.focus();
    });

    $('#btnPaste').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        editor.insert(text);
        showToast('Вставлено');
      } catch (error) {
        addRow('error', 'Нет доступа к буферу. На телефоне можно вставить долгим нажатием в редакторе.');
      }
      editor.focus();
    });

    $('#btnClearCode').addEventListener('click', () => {
      if (!editor.getValue().trim()) return;
      if (confirm('Стереть весь код из редактора?')) {
        editor.setValue('', -1);
        localStorage.removeItem(STORAGE.code);
        clearProjectState();
        fileNamePill.textContent = 'без файла';
        lastImportedFileName = '';
        $('#clearConsole').click();
        showToast('Редактор очищен');
      }
      editor.focus();
    });

    const DEFAULT_CODE =
`<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
    }
    .card {
      max-width: 320px;
      padding: 24px;
      border-radius: 24px;
      background: #1f2937;
      text-align: center;
    }
  <\/style>
</head>
<body>
  <main class="card">
    <h1>Код готов к запуску 🚀</h1>
    <p>Нажмите «Запуск», а сообщения из console.log появятся в консоли.</p>
  </main>

  <script>
    var message = "Здесь анализатор покажет предупреждение про var";
    console.log(message);
  <\/script>
</body>
</html>`;

    function getFileExt(fileName) {
      return (fileName.split('.').pop() || '').toLowerCase();
    }

    function fileIcon(fileName) {
      const ext = getFileExt(fileName);
      if (['html', 'htm'].includes(ext)) return '🌐';
      if (ext === 'css') return '🎨';
      if (['js', 'mjs', 'cjs'].includes(ext)) return '⚙️';
      if (['ts', 'tsx'].includes(ext)) return '🔷';
      if (ext === 'jsx') return '⚛️';
      if (ext === 'py') return '🐍';
      return '📄';
    }

    function uniqueFileName(name, existingMap) {
      const normalized = name || 'file.txt';
      if (!existingMap.has(normalized)) return normalized;

      const dot = normalized.lastIndexOf('.');
      const base = dot > 0 ? normalized.slice(0, dot) : normalized;
      const ext = dot > 0 ? normalized.slice(dot) : '';
      let index = 2;
      let candidate = base + '-' + index + ext;

      while (existingMap.has(candidate)) {
        index++;
        candidate = base + '-' + index + ext;
      }

      return candidate;
    }

    function projectFileList() {
      return Array.from(projectFiles.values());
    }

    function hasProjectFiles() {
      return projectFiles.size > 0;
    }

    function saveProject() {
      if (!hasProjectFiles()) {
        localStorage.removeItem(STORAGE.project);
        return;
      }

      const payload = {
        activeFileName,
        files: projectFileList().map(file => ({
          name: file.name,
          content: file.content,
          size: file.size || new Blob([file.content || '']).size,
          lastModified: file.lastModified || Date.now()
        }))
      };

      localStorage.setItem(STORAGE.project, JSON.stringify(payload));
    }

    function loadProject() {
      try {
        const raw = localStorage.getItem(STORAGE.project);
        if (!raw) return false;

        const payload = JSON.parse(raw);
        if (!payload || !Array.isArray(payload.files) || !payload.files.length) return false;

        projectFiles = new Map();
        payload.files.forEach(file => {
          if (!file || !file.name) return;
          projectFiles.set(file.name, {
            name: file.name,
            content: String(file.content || ''),
            size: Number(file.size || 0),
            lastModified: Number(file.lastModified || Date.now())
          });
        });

        if (!projectFiles.size) return false;
        activeFileName = projectFiles.has(payload.activeFileName) ? payload.activeFileName : projectFileList()[0].name;
        return true;
      } catch (error) {
        localStorage.removeItem(STORAGE.project);
        return false;
      }
    }

    function saveActiveEditorFile() {
      if (!activeFileName || !projectFiles.has(activeFileName)) return;

      const file = projectFiles.get(activeFileName);
      file.content = editor.getValue();
      file.size = new Blob([file.content]).size;
      projectFiles.set(activeFileName, file);
      saveProject();
    }

    function clearProjectState() {
      projectFiles.clear();
      activeFileName = '';
      lastImportedFileName = '';
      localStorage.removeItem(STORAGE.project);
      renderFileTabs();
    }

    function renderFileTabs() {
      fileTabs.innerHTML = '';

      if (!projectFiles.size) {
        fileTabs.classList.remove('visible');
        fileNamePill.textContent = lastImportedFileName || 'без файла';
        return;
      }

      fileTabs.classList.add('visible');
      projectFileList().forEach(file => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'file-tab' + (file.name === activeFileName ? ' active' : '');
        button.title = file.name;
        button.innerHTML = '<span aria-hidden="true">' + fileIcon(file.name) + '</span><span class="file-tab-name">' + escapeHtml(file.name) + '</span><span class="file-tab-ext">' + escapeHtml(readableBytes(file.size || new Blob([file.content || '']).size)) + '</span>';
        button.addEventListener('click', () => setActiveFile(file.name));
        fileTabs.appendChild(button);
      });

      const hint = document.createElement('span');
      hint.className = 'project-hint';
      hint.textContent = projectFiles.size > 1 ? 'Сборка проекта' : 'Один файл';
      fileTabs.appendChild(hint);

      fileNamePill.textContent = activeFileName || 'без файла';
    }

    function setActiveFile(fileName, options = {}) {
      if (!projectFiles.has(fileName)) return;
      if (!options.skipSave) saveActiveEditorFile();

      const file = projectFiles.get(fileName);
      activeFileName = file.name;
      lastImportedFileName = file.name;
      isSwitchingFile = true;
      editor.setValue(file.content || '', -1);
      editor.clearSelection();
      isSwitchingFile = false;

      const langFromExt = extensionLang(file.name);
      if (langFromExt !== 'auto') {
        $('#langOverride').value = langFromExt;
        localStorage.setItem(STORAGE.lang, langFromExt);
      }

      renderFileTabs();
      detectAndApplyMode();
      saveProject();
      setTimeout(() => editor.resize(), 40);
    }

    if (loadProject()) {
      setActiveFile(activeFileName, { skipSave: true });
    } else {
      editor.setValue(localStorage.getItem(STORAGE.code) || DEFAULT_CODE, -1);
      renderFileTabs();
    }

    function extensionLang(fileName) {
      const ext = (fileName.split('.').pop() || '').toLowerCase();
      const map = {
        html: 'html',
        htm: 'html',
        js: 'js',
        mjs: 'js',
        cjs: 'js',
        jsx: 'jsx',
        ts: 'ts',
        tsx: 'ts',
        py: 'py',
        css: 'css',
        json: 'js',
        svg: 'html',
        txt: 'auto',
        md: 'auto'
      };
      return map[ext] || 'auto';
    }

    function detectLang(code) {
      const override = $('#langOverride').value;
      if (override !== 'auto') return override;
      if (/<!doctype html|<\s*html\b|<style[\s>]|<script[\s>]/i.test(code)) return 'html';
      if (/import\s+React|from\s+['"]react['"]|<[A-Z][\w.]*[\s/>]/.test(code)) return 'jsx';
      if (/\binterface\s+\w+|:\s*(number|string|boolean|unknown|any)\b|type\s+\w+\s*=/.test(code)) return 'ts';
      if (/^\s*(def|class)\s+\w+|\bprint\s*\(|^\s*import\s+\w+/m.test(code) && !/[{};]/.test(code)) return 'py';
      return 'js';
    }

    function applyMode(lang) {
      const modeMap = {
        html: 'html',
        jsx: 'javascript',
        js: 'javascript',
        ts: 'typescript',
        py: 'python',
        css: 'css'
      };
      editor.session.setMode('ace/mode/' + (modeMap[lang] || 'javascript'));
    }

    function makeIssue({ level = 'warn', line = 1, title, message, simple, why, fix, example }) {
      return {
        level,
        line: Math.max(1, line || 1),
        title,
        message: message || title,
        simple: simple || message || title,
        why: why || 'Такой фрагмент может запутать код или привести к неожиданному поведению.',
        fix: fix || 'Проверьте эту строку и перепишите её более явно.',
        example: example || ''
      };
    }

    function runLinter(code, lang) {
      const issues = [];
      const lines = code.split('\n');

      const whileTrueLine = lines.findIndex(line => /\bwhile\s*\(\s*true\s*\)/.test(line)) + 1;
      if (whileTrueLine && !/\bbreak\b/.test(code)) {
        issues.push(makeIssue({
          level: 'error',
          line: whileTrueLine,
          title: 'Бесконечный цикл while(true)',
          simple: 'Код может зависнуть, потому что цикл повторяется бесконечно и в нём нет выхода.',
          why: 'while(true) работает постоянно. Если внутри нет break, return или другого понятного выхода, страница может перестать отвечать.',
          fix: 'Добавьте условие остановки или break внутри цикла.',
          example: 'let count = 0;\nwhile (count < 10) {\n  count++;\n}'
        }));
      }

      const forEverLine = lines.findIndex(line => /\bfor\s*\(\s*;\s*;\s*\)/.test(line)) + 1;
      if (forEverLine && !/\bbreak\b/.test(code)) {
        issues.push(makeIssue({
          level: 'error',
          line: forEverLine,
          title: 'Бесконечный цикл for(;;)',
          simple: 'Цикл написан без начала, условия и шага. Он будет крутиться бесконечно.',
          why: 'for(;;) — это специальная форма вечного цикла. Без break или return приложение может зависнуть.',
          fix: 'Задайте понятное условие цикла или добавьте безопасную точку выхода.',
          example: 'for (let i = 0; i < 10; i++) {\n  console.log(i);\n}'
        }));
      }

      if (['js', 'ts', 'jsx', 'html'].includes(lang)) {
        lines.forEach((line, index) => {
          const rowNum = index + 1;
          const trimmed = line.trim();

          if (/\bvar\b/.test(trimmed) && !/^\s*(\/\/|\*)/.test(trimmed)) {
            issues.push(makeIssue({
              line: rowNum,
              title: 'Старое объявление var',
              simple: 'Здесь переменная объявлена через var. Сейчас обычно используют const или let.',
              why: 'var имеет область видимости функции, а не блока. Из-за этого переменная может быть доступна там, где вы её не ждёте.',
              fix: 'Используйте const, если значение не меняется, или let, если значение нужно изменить.',
              example: 'const name = "Анна";\nlet score = 0;'
            }));
          }

          if (/\bdebugger\b/.test(trimmed) && !/^\s*(\/\/|\*)/.test(trimmed)) {
            issues.push(makeIssue({
              line: rowNum,
              title: 'Остался debugger',
              simple: 'В коде осталась команда для отладки. У пользователя она может остановить выполнение страницы.',
              why: 'debugger нужен только разработчику. В готовом приложении он мешает запуску и выглядит как зависание.',
              fix: 'Удалите строку debugger или закомментируйте её на время.',
              example: '// debugger;'
            }));
          }

          if (/\{\s*\}/.test(trimmed) && !/=\s*\{\s*\}/.test(trimmed) && !/import\s*\{/.test(trimmed)) {
            issues.push(makeIssue({
              line: rowNum,
              title: 'Пустой блок кода',
              simple: 'Фигурные скобки есть, но внутри ничего не выполняется.',
              why: 'Пустой блок часто означает, что логика случайно не дописана или была удалена.',
              fix: 'Добавьте нужное действие внутрь блока или удалите пустой блок.',
              example: 'if (isReady) {\n  startApp();\n}'
            }));
          }

          const nesting = Math.floor((line.match(/^\s*/)[0].replace(/\t/g, '  ').length) / 2);
          if (nesting > 5 && trimmed) {
            issues.push(makeIssue({
              line: rowNum,
              title: 'Слишком глубокая вложенность',
              simple: 'Код слишком сильно вложен внутрь условий или циклов. Его станет трудно читать и исправлять.',
              why: 'Когда блоков слишком много, легко ошибиться с логикой и сложно понять, какая часть за что отвечает.',
              fix: 'Вынесите часть логики в отдельную функцию или сделайте ранний выход через return.',
              example: 'function canOpen(user) {\n  if (!user) return false;\n  if (!user.active) return false;\n  return true;\n}'
            }));
          }

          if (/console\.log\(/.test(trimmed) && /пароль|password|token|secret|ключ/i.test(trimmed)) {
            issues.push(makeIssue({
              level: 'error',
              line: rowNum,
              title: 'Секретные данные выводятся в консоль',
              simple: 'В консоль может попасть пароль, токен или ключ. Это небезопасно.',
              why: 'Консоль могут увидеть другие люди, расширения браузера или инструменты отладки.',
              fix: 'Не выводите секреты в console.log. Показывайте только безопасные сообщения.',
              example: 'console.log("Пользователь авторизован");'
            }));
          }
        });

        const openScript = (code.match(/<script\b/gi) || []).length;
        const closeScript = (code.match(/<\/script>/gi) || []).length;
        if (lang === 'html' && openScript !== closeScript) {
          issues.push(makeIssue({
            level: 'error',
            line: 1,
            title: 'Не закрыт тег script',
            simple: 'В HTML есть открытый <script>, но нет закрывающего <\/script>.',
            why: 'Браузер может считать весь остальной код частью скрипта, из-за чего страница сломается.',
            fix: 'Проверьте каждый <script> и добавьте закрывающий тег.',
            example: '<script>\n  console.log("ok");\n<\\/script>'
          }));
        }
      }

      if (lang === 'py') {
        lines.forEach((line, index) => {
          if (/\bwhile\s+True\s*:/.test(line) && !/\bbreak\b/.test(code)) {
            issues.push(makeIssue({
              level: 'error',
              line: index + 1,
              title: 'Бесконечный цикл while True',
              simple: 'Python-код может выполняться бесконечно, потому что у цикла нет выхода.',
              why: 'while True повторяется постоянно. В браузере это может заморозить Python-движок.',
              fix: 'Добавьте условие остановки или break.',
              example: 'count = 0\nwhile count < 10:\n    count += 1'
            }));
          }
        });
      }

      activeIssues = issues;
      lintErrorsCount = issues.filter(issue => issue.level === 'error').length;
      renderIssues();
      renderAceAnnotations(issues);
      return issues;

    async function readProjectFile(file, existingMap) {
      const maxSize = 5 * 1024 * 1024;
      if (file.size > maxSize) {

      const text = await file.text();
      const safeName = uniqueFileName(file.name, existingMap);
      return {
        name: safeName,
        content: text,
        size: file.size,
        lastModified: file.lastModified || Date.now()
      };
    }

    async function importFiles(fileList) {
      const files = Array.from(fileList || []).filter(Boolean);
      if (!files.length) return;

      const hasCurrentCode = editor.getValue().trim() || projectFiles.size;
      const confirmText = files.length === 1
        ? 'Заменить текущий код файлом «' + files[0].name + '»?'
        : 'Заменить текущий проект этими файлами?\n\n' + files.map(file => '• ' + file.name).join('\n');

      if (hasCurrentCode && !confirm(confirmText)) {
        fileInput.value = '';
        return;
      }

      try {
        const nextFiles = new Map();
        for (const file of files) {
          const projectFile = await readProjectFile(file, nextFiles);
          nextFiles.set(projectFile.name, projectFile);
        }

        projectFiles = nextFiles;
        const htmlEntry = projectFileList().find(file => /(^|\/|\\)index\.html?$/i.test(file.name)) || projectFileList().find(file => /\.html?$/i.test(file.name));
        const firstRunnable = htmlEntry || projectFileList().find(file => /\.(js|jsx|ts|tsx|css)$/i.test(file.name)) || projectFileList()[0];

        activeFileName = firstRunnable.name;
        lastImportedFileName = firstRunnable.name;
        localStorage.removeItem(STORAGE.code);
        setActiveFile(activeFileName, { skipSave: true });

        const names = projectFileList().map(file => file.name).join(', ');
        const totalSize = projectFileList().reduce((sum, file) => sum + (file.size || 0), 0);
        addRow('info', 'Импортировано файлов: ' + projectFiles.size + '. Общий размер: ' + readableBytes(totalSize) + '. Файлы: ' + names + '.');

        if (projectFiles.size > 1) {
          addRow('info', 'Теперь при запуске приложение собирает проект: HTML берётся из index.html, CSS вставляется в <head>, JS вставляется перед </body>.');
          showToast('Проект импортирован');
        } else {
          showToast('Файл импортирован');
        }

        switchTab('tab-editor');
      } catch (error) {
        addRow('error', 'Не удалось импортировать файлы: ' + String(error && error.message ? error.message : error));

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector('script[src="' + src + '"]')) return resolve();
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error('Не удалось загрузить библиотеку: ' + src));
        document.head.appendChild(script);
      });
    }

    function buildConsoleCaptureScript() {
      return `<script>
        (function () {
          function safe(value) {
            try {
              if (typeof value === 'string') return value;
              return JSON.stringify(value, null, 2);
            } catch (error) {
              return String(value);
            }
          }

          function post(payload) {
            try {
              if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*');
            } catch (error) {}

            try {
              if (window.opener && !window.opener.closed) window.opener.postMessage(payload, '*');
            } catch (error) {}
          }

          function send(level, args) {
            post({
              type: 'mobile-console',
              level: level,
              args: Array.prototype.slice.call(args).map(safe)
            });
          }

          ['log', 'info', 'warn', 'error'].forEach(function (level) {
            var original = console[level];
            console[level] = function () {
              send(level, arguments);
              if (original) original.apply(console, arguments);
            };
          });

          window.onerror = function (message, source, line, column) {
            send('error', [String(message) + ' — строка ' + line + (column ? ', колонка ' + column : '')]);
          };

          window.onunhandledrejection = function (event) {
            send('error', ['Promise error: ' + (event.reason && event.reason.message ? event.reason.message : event.reason)]);
          };
        })();
      <\/script>`;
    }

    function createHtmlDocument(code, lang, compiledCode) {
      const capture = buildConsoleCaptureScript();

      if (lang === 'html') {
        if (/<head[^>]*>/i.test(code)) return code.replace(/<head([^>]*)>/i, '<head$1>' + capture);
        if (/<html[^>]*>/i.test(code)) return code.replace(/<html([^>]*)>/i, '<html$1><head>' + capture + '</head>');
        return '<!DOCTYPE html><html><head>' + capture + '</head><body>' + code + '</body></html>';
      }

      return '<!DOCTYPE html><html lang="ru"><head>' +
        '<meta charset="UTF-8" />' +
        '<meta name="viewport" content="width=device-width, initial-scale=1" />' +
        capture +
        '</head><body><div id="root"></div><script>' + compiledCode + '<\/script></body></html>';
    }


    function normalizeFileRef(value) {
      let ref = String(value || '').trim().replace(/\\/g, '/');
      ref = ref.split('#')[0].split('?')[0];
      try { ref = decodeURIComponent(ref); } catch (error) {}
      ref = ref.replace(/^\.\//, '').replace(/^\//, '');
      return ref;
    }

    function findProjectFile(ref) {
      const normalized = normalizeFileRef(ref);
      if (!normalized) return null;
      if (projectFiles.has(normalized)) return projectFiles.get(normalized);

      const noDot = normalized.replace(/^\.\//, '');
      if (projectFiles.has(noDot)) return projectFiles.get(noDot);

      const baseName = noDot.split('/').pop();
      return projectFileList().find(file => file.name === baseName || file.name.endsWith('/' + baseName)) || null;
    }

    function isStyleFile(name) {
      return /\.css$/i.test(name);
    }

    function isScriptFile(name) {
      return /\.(js|mjs|cjs|jsx|ts|tsx)$/i.test(name);
    }

    function escapeAttribute(value) {
      return String(value).replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function safeStyleContent(value) {
      return String(value || '').replace(/<\/style/gi, '<\\/style');
    }

    function safeScriptContent(value) {
      return String(value || '').replace(/<\/script/gi, '<\\/script');
    }

    function insertIntoHead(html, content) {
      if (!content) return html;
      if (/<\/head>/i.test(html)) return html.replace(/<\/head>/i, content + '\n</head>');
      if (/<body([^>]*)>/i.test(html)) return html.replace(/<body([^>]*)>/i, '<head>' + content + '\n</head><body$1>');
      return '<head>' + content + '\n</head>' + html;
    }

    function insertBeforeBodyEnd(html, content) {
      if (!content) return html;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, content + '\n</body>');
      return html + '\n' + content;
    }

    async function transpileProjectScript(file) {
      const ext = getFileExt(file.name);
      let code = file.content || '';

      if (ext === 'jsx') {
        addRow('info', 'Компилирую JSX-файл «' + file.name + '» через Babel...');
        await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
        code = Babel.transform(code, { presets: ['react', 'env'] }).code;
      }

      if (['ts', 'tsx'].includes(ext)) {
        addRow('info', 'Компилирую TypeScript-файл «' + file.name + '» в JavaScript...');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js');
        if (window.ts.transpileModule) {
          code = window.ts.transpileModule(code, {
            compilerOptions: {
              target: window.ts.ScriptTarget.ES2020,
              jsx: window.ts.JsxEmit ? window.ts.JsxEmit.React : undefined
            }
          }).outputText;
        } else {
          code = window.ts.transpile(code, { target: window.ts.ScriptTarget.ES2020 });
        }
      }

      return safeScriptContent(code);
    }

    async function buildProjectDocument() {
      saveActiveEditorFile();

      const files = projectFileList();
      const htmlFile = files.find(file => /(^|\/|\\)index\.html?$/i.test(file.name)) || files.find(file => /\.html?$/i.test(file.name));
      const cssFiles = files.filter(file => isStyleFile(file.name));
      const scriptFiles = files.filter(file => isScriptFile(file.name));
      const usedCss = new Set();
      const usedScripts = new Set();
      let html = htmlFile ? htmlFile.content : '';

      if (htmlFile) {
        html = html.replace(/<link\b([^>]*?)\bhref\s*=\s*(['"])([^'"]+)\2([^>]*)>/gi, (match, before, quote, href) => {
          const file = findProjectFile(href);
          if (!file || !isStyleFile(file.name)) return match;
          usedCss.add(file.name);
          return '<style data-project-file="' + escapeAttribute(file.name) + '">\n' + safeStyleContent(file.content) + '\n</style>';
        });

        html = html.replace(/<script\b([^>]*?)\bsrc\s*=\s*(['"])([^'"]+)\2([^>]*)>\s*<\/script>/gi, (match, before, quote, src, after) => {
          const file = findProjectFile(src);
          if (!file || !isScriptFile(file.name)) return match;
          usedScripts.add(file.name);
          const attrs = (before + ' ' + after).replace(/\s+src\s*=\s*(['"])[^'"]+\1/i, '').trim();
          return '<script ' + (attrs ? attrs + ' ' : '') + 'data-project-file="' + escapeAttribute(file.name) + '">\n' + safeScriptContent(file.content) + '\n<\/script>';
        });
      } else {
        html = '<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Project Preview</title></head><body><div id="root"></div></body></html>';
      }

      const missingStyles = cssFiles
        .filter(file => !usedCss.has(file.name))
        .map(file => '<style data-project-file="' + escapeAttribute(file.name) + '">\n' + safeStyleContent(file.content) + '\n</style>')
        .join('\n');
      html = insertIntoHead(html, missingStyles);

      const missingScripts = [];
      for (const file of scriptFiles) {
        if (usedScripts.has(file.name)) continue;
        const scriptCode = await transpileProjectScript(file);
        missingScripts.push('<script data-project-file="' + escapeAttribute(file.name) + '">\n' + scriptCode + '\n<\/script>');
      }
      html = insertBeforeBodyEnd(html, missingScripts.join('\n'));

      return createHtmlDocument(html, 'html', '');
    }

    async function buildPreviewDocument(code, lang) {
      if (hasProjectFiles()) {
        addRow('info', 'Собираю проект из ' + projectFiles.size + ' файлов...');
        return {
          html: await buildProjectDocument(),
          label: 'Проект собран и запущен. Console.log из встроенного и отдельного превью будет появляться здесь.'
        };
      }

      if (['html', 'jsx', 'js', 'ts'].includes(lang)) {
        let compiledCode = code;

        if (lang === 'jsx') {
          addRow('info', 'Компилирую React JSX через Babel...');
          await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
          compiledCode = Babel.transform(code, { presets: ['react', 'env'] }).code;
        }

        if (lang === 'ts') {
          addRow('info', 'Компилирую TypeScript в JavaScript...');
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js');
          compiledCode = window.ts.transpile(code, { target: window.ts.ScriptTarget.ES2020 });
        }

        return {
          html: createHtmlDocument(code, lang, compiledCode),
          label: 'Код запущен во встроенном превью. Сообщения console.log будут здесь.'
        };
      }

      if (lang === 'css') {
        return {
          html: createHtmlDocument('<!DOCTYPE html><html><head><style>' + safeStyleContent(code) + '</style></head><body><h1>CSS импортирован</h1><p>Стиль применён к этой тестовой странице.</p></body></html>', 'html', ''),
          label: 'CSS показан на тестовой странице в превью.'
        };
      }

      return null;
    }

    function writeExternalPlaceholder(targetWindow, title, text) {

        if (externalPreviewUrl) URL.revokeObjectURL(externalPreviewUrl);

        targetWindow.location.href = externalPreviewUrl;
        addRow('info', 'Превью открыто на отдельной странице. Если эта вкладка приложения остаётся открытой, console.log из новой страницы тоже будет приходить сюда.');
        switchTab('tab-output');
      } catch (error) {
        writeExternalPlaceholder(targetWindow, 'Ошибка сборки', String(error && error.message ? error.message : error));
        addRow('error', String(error && error.stack ? error.stack : error));
        switchTab('tab-output');
      }
    }

    async function run() {
      const code = editor.getValue();
      const lang = detectAndApplyMode();

      $('#clearConsole').click();

      if (!code.trim() && !hasProjectFiles()) {
        addRow('warn', 'Редактор пустой. Импортируйте один или несколько файлов или вставьте код.');
        switchTab('tab-output');
        return;
      }

      if (lintErrorsCount > 0) {
        addRow('error', 'Запуск остановлен: сначала откройте «Проблема» и исправьте критические ошибки.');
        problemPanel.classList.add('visible');
        switchTab('tab-editor');
        return;
      }

      try {
        switchTab('tab-output');

        if (lang === 'py' && !hasProjectFiles()) {
          addRow('info', 'Запускаю Python через Pyodide. Первый запуск может занять немного времени.');
          if (!window.pyodide) {
            await loadScript('https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js');
            window.pyodide = await loadPyodide();
            window.pyodide.setStdout({ batched: value => addRow('log', value) });
            window.pyodide.setStderr({ batched: value => addRow('error', value) });
          }
          await window.pyodide.runPythonAsync(code);
          return;
        }

        const preview = await buildPreviewDocument(code, lang);
        if (!preview) {
          addRow('warn', 'Для этого языка нет визуального превью. Используйте HTML/CSS/JS или Python-консоль.');
          return;
        }

        previewBox.style.display = '';
        previewFrame.srcdoc = preview.html;
        addRow('info', preview.label);
      } catch (error) {
        addRow('error', String(error && error.stack ? error.stack : error));
      }
    }

    $('#runBtn').addEventListener('click', run);
    $('#mobileRunBtn').addEventListener('click', run);
    $('#openPreviewPage').addEventListener('click', openPreviewInNewPage);

    window.addEventListener('message', event => {
      if (event.data && event.data.type === 'mobile-console') {
        addRow(event.data.level || 'log', (event.data.args || []).join(' '));
      }
    });

    window.addEventListener('resize', () => {
      editor.setFontSize(window.innerWidth < 480 ? 13.5 : 14);
      editor.resize();
    });

    detectAndApplyMode();
  </script>
</body>
</html>
