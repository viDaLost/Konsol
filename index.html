<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Универсальная Мобильная Консоль — v4.1 PRO</title>
  
  <style>
    :root {
      --bg: #090b10; --panel: #111420; --panel-2: #161b2d; --text: #f1f5f9; --muted: #64748b;
      --accent: #3b82f6; --ok: #10b981; --warn: #f59e0b; --err: #ef4444; --shadow: 0 12px 30px rgba(0,0,0,.4);
      --radius: 12px; --border: 1px solid rgba(255,255,255,.06);
    }
    [data-theme="light"] {
      --bg: #f8fafc; --panel: #ffffff; --panel-2: #f1f5f9; --text: #0f172a; --muted: #64748b; 
      --accent: #2563eb; --shadow: 0 10px 25px rgba(15,23,42,.05); --border: 1px solid rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, sans-serif; }
    
    .app { height: 100%; display: flex; flex-direction: column; }
    
    /* Компактный адаптивный хедер */
    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--panel); border-bottom: var(--border); gap: 8px; }
    .brand { display: flex; flex-direction: column; }
    .brand b { font-size: 14px; letter-spacing: -0.3px; }
    .brand span { font-size: 11px; color: var(--ok); font-weight: 500; }
    
    .controls { display: flex; align-items: center; gap: 6px; }
    button, select { 
      border: var(--border); background: var(--panel-2); color: var(--text); padding: 8px 10px; 
      border-radius: var(--radius); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    button:active { transform: scale(0.95); opacity: 0.8; }
    .primary { background: var(--accent); color: #fff; border: none; font-weight: 600; padding: 8px 14px; }
    .danger { background: rgba(239, 68, 68, 0.15); color: var(--err); border: 1px solid rgba(239, 68, 68, 0.2); }
    
    /* Сетка макета */
    .layout { flex: 1; display: flex; overflow: hidden; position: relative; }
    .col { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; background: var(--bg); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* Панель инструментов над редактором */
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: var(--panel-2); border-bottom: var(--border); }
    .btn-group { display: flex; gap: 4px; }
    .toolbar button { padding: 5px 8px; font-size: 12px; border-radius: 6px; }
    
    /* Статус-карточки линтера */
    .lint-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
    .lint-clean { background: rgba(16, 185, 129, 0.15); color: var(--ok); }
    .lint-issues { background: rgba(245, 158, 11, 0.15); color: var(--warn); cursor: pointer; }

    #editor { flex: 1; width: 100%; font-family: 'Fira Code', monospace; }
    
    /* Консоль вывода */
    .output-container { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: var(--panel-2); border-bottom: var(--border); font-size: 12px; font-weight: 600; color: var(--muted); }
    
    /* Всплывающий блок подробных отчетов анализатора */
    .lint-report { background: var(--panel); border-bottom: var(--border); max-height: 120px; overflow-y: auto; display: none; }
    .lint-report.visible { display: block; }
    .lint-item { padding: 6px 14px; font-size: 12px; border-left: 3px solid var(--warn); display: flex; gap: 8px; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .lint-item.err { border-left-color: var(--err); color: var(--err); }
    .lint-item .pos { color: var(--muted); font-family: monospace; }

    /* Окно логов */
    .log { flex: 1; overflow-y: auto; padding: 8px; font-family: monospace; font-size: 13px; background: var(--bg); }
    .row { display: flex; gap: 6px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; word-break: break-all; border-bottom: 1px solid rgba(128,128,128,0.05); }
    .row.info { color: var(--accent); background: rgba(59, 130, 246, 0.05); }
    .row.warn { color: var(--warn); background: rgba(245, 158, 11, 0.07); }
    .row.error { color: var(--err); background: rgba(239, 68, 68, 0.07); }
    .row .tag { font-weight: 700; font-size: 10px; text-transform: uppercase; margin-top: 2px; opacity: 0.8; }
    .row pre { margin: 0; white-space: pre-wrap; font-family: inherit; }

    /* Нижнее мобильное меню */
    .nav-tabs { display: flex; background: var(--panel); border-top: var(--border); padding: 6px; padding-bottom: env(safe-area-inset-bottom, 6px); }
    .nav-btn { flex: 1; background: transparent; border: none; padding: 10px; border-radius: var(--radius); color: var(--muted); font-weight: 600; font-size: 13px; flex-direction: column; gap: 2px; }
    .nav-btn.active { background: var(--panel-2); color: var(--accent); }
    .nav-btn .dot { width: 6px; height: 6px; background: var(--err); border-radius: 50%; display: none; position: absolute; margin-left: 55px; margin-top: -15px; }
    .nav-btn.has-error .dot { display: block; }

    /* Настройки сеток для планшетов и десктопов */
    @media (min-width: 900px) {
      .app { padding: 12px; gap: 12px; }
      header { border-radius: var(--radius); border: var(--border); box-shadow: var(--shadow); }
      .layout { gap: 12px; }
      .col { border-radius: var(--radius); border: var(--border); box-shadow: var(--shadow); overflow: hidden; }
      .nav-tabs { display: none; }
    }

    /* Мобильный сдвиг экранов */
    @media (max-width: 899px) {
      .col { position: absolute; top:0; left:0; right:0; bottom:0; transform: translateX(100%); }
      .col.active { transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <div class="brand">
        <b>UCC v4.1 PRO</b>
        <span id="status">Анализатор активен</span>
      </div>
      <div class="controls">
        <select id="langOverride" style="padding: 6px 8px; font-size: 12px;">
          <option value="auto">Язык: Авто</option>
          <option value="html">HTML/CSS/JS</option>
          <option value="jsx">React JSX</option>
          <option value="js">JavaScript</option>
          <option value="ts">TypeScript</option>
          <option value="py">Python</option>
        </select>
        <button id="themeBtn" title="Сменить тему">🌓</button>
        <button class="primary" id="runBtn">▶ Запуск</button>
      </div>
    </header>

    <div class="layout">
      <!-- ВКЛАДКА РЕДАКТОРА -->
      <div class="col active" id="tab-editor">
        <div class="toolbar">
          <div class="btn-group">
            <button id="btnCut" title="Вырезать выделенное">Вырезать ✂</button>
            <button id="btnCopy" title="Копировать всё/выделенное">Копировать 📋</button>
            <button id="btnPaste" title="Вставить из буфера">Вставить 📄</button>
            <button class="danger" id="btnClearCode" title="Полностью стереть код">Сброс 🗑</button>
          </div>
          <div id="lintStatus" class="lint-badge lint-clean">✨ Код чист</div>
        </div>
        <div id="editor"></div>
      </div>

      <!-- ВКЛАДКА КОНСОЛИ -->
      <div class="col" id="tab-output">
        <div class="output-container">
          <div class="lint-report" id="lintReportBox"></div>
          
          <div class="panel-header">
            <span>📟 КОНСОЛЬ ВЫВОДА</span>
            <button id="clearConsole" style="padding: 2px 8px; font-size: 11px;">Очистить лог</button>
          </div>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>

    <!-- Навигация для мобильных -->
    <div class="nav-tabs">
      <button class="nav-btn active" data-target="tab-editor">📝 Редактор</button>
      <button class="nav-btn" data-target="tab-output" id="outputNavBtn">
        📟 Консоль <span class="dot"></span>
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.js"></script>
  
  <script>
    const $ = s => document.querySelector(s);
    const logEl = $('#log');
    let lintErrorsCount = 0;

    // Настройка Ace Editor
    const editor = ace.edit("editor");
    editor.setOptions({
      fontSize: "14px",
      showPrintMargin: false,
      wrap: true,
      useWorker: false,
      highlightActiveLine: true
    });
    
    // Переключение Тем оформления
    function applyTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      editor.setTheme(isDark ? "ace/theme/tomorrow_night_eighties" : "ace/theme/chrome");
    }
    $('#themeBtn').onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('ucc4_theme', next);
      applyTheme();
    };
    if(localStorage.getItem('ucc4_theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('ucc4_theme'));
    applyTheme();

    // Буфер обмена (Cut, Copy, Paste)
    $('#btnCopy').onclick = () => {
      const text = editor.getSelectedText() || editor.getValue();
      navigator.clipboard.writeText(text);
      editor.focus();
    };
    $('#btnCut').onclick = () => {
      const text = editor.getSelectedText();
      if(text) {
        navigator.clipboard.writeText(text);
        editor.session.replace(editor.selection.getRange(), '');
      }
      editor.focus();
    };
    $('#btnPaste').onclick = async () => {
      try {
        const text = await navigator.clipboard.readText();
        editor.insert(text);
      } catch (err) {
        addRow('ошибка', 'Нет доступа к буферу. Разрешите доступ в настройках.');
      }
      editor.focus();
    };

    // Очистить весь код (Кнопка Сброса)
    $('#btnClearCode').onclick = () => {
      if(confirm('Вы уверены, что хотите полностью стереть текущий код? Восстановить его будет нельзя.')) {
        editor.setValue('', -1);
        localStorage.removeItem('ucc4_code');
        $('#clearConsole').click();
      }
      editor.focus();
    };

    // Мобильная навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
        editor.blur(); 
      });
    });

    // Добавление строки лога в консоль
    function addRow(kind, text) {
      const mapKind = { 'log': 'лог', 'info': 'инфо', 'warn': 'предупреждение', 'error': 'ошибка' };
      const displayKind = mapKind[kind] || kind;
      
      const row = document.createElement('div'); row.className = `row ${kind}`;
      row.innerHTML = `<span class="tag">${displayKind}</span><pre>${text}</pre>`;
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
      
      if (kind === 'error') {
        $('#outputNavBtn').classList.add('has-error');
      }
    }
    $('#clearConsole').onclick = () => {
      logEl.innerHTML = '';
      $('#outputNavBtn').classList.remove('has-error');
    };

    // --- СТАТИЧЕСКИЙ АНАЛИЗАТОР И ПРОВЕРКА ЛОГИКИ ---
    function runLinter(code, lang) {
      const issues = [];
      const lines = code.split('\n');

      // Ловушки на бесконечные циклы
      if (/\bwhile\s*\(\s*true\s*\)/.test(code) && !/\bbreak\b/.test(code)) {
        issues.push({ level: 'error', msg: 'Потенциальный бесконечный цикл while(true) без оператора break!', line: 1 });
      }
      if (/\bfor\s*\(\s*;\s*;\s*\)/.test(code) && !/\bbreak\b/.test(code)) {
        issues.push({ level: 'error', msg: 'Обнаружен бесконечный цикл for(;;) без точки выхода.', line: 1 });
      }

      // Базовые метрики чистоты кода для JS/TS стека
      if (['js', 'ts', 'jsx', 'html'].includes(lang)) {
        lines.forEach((line, index) => {
          const rowNum = index + 1;
          const trimmed = line.trim();

          if (/\bvar\b/.test(trimmed) && !/(\/\/|\*)/.test(trimmed)) {
            issues.push({ level: 'warn', msg: 'Используйте современные const или let вместо var.', line: rowNum });
          }
          if (/\bdebugger\b/.test(trimmed) && !/(\/\/|\*)/.test(trimmed)) {
            issues.push({ level: 'warn', msg: 'В коде остался отладочный оператор "debugger".', line: rowNum });
          }
          if (/\{\s*\}/.test(trimmed) && !/=\s*\{\s*\}/.test(trimmed)) {
            issues.push({ level: 'warn', msg: 'Пустой блок выполнения {}. Возможна потеря логики.', line: rowNum });
          }
          if ((line.match(/^\s*/)[0].length / 2) > 5) {
            issues.push({ level: 'warn', msg: 'Слишком глубокая вложенность конструкций. Код тяжело читать.', line: rowNum });
          }
        });
      }

      // Обновление интерфейса анализатора
      const badge = $('#lintStatus');
      const reportBox = $('#lintReportBox');
      reportBox.innerHTML = '';
      lintErrorsCount = issues.filter(i => i.level === 'error').length;

      if (issues.length === 0) {
        badge.className = 'lint-badge lint-clean';
        badge.innerHTML = '✨ Код чист';
        reportBox.classList.remove('visible');
      } else {
        badge.className = 'lint-badge lint-issues';
        badge.innerHTML = `⚠️ Проблемы: ${issues.length}`;
        
        issues.forEach(issue => {
          const div = document.createElement('div');
          div.className = `lint-item ${issue.level === 'error' ? 'err' : ''}`;
          div.innerHTML = `<span class="pos">Строка ${issue.line}:</span> <span>${issue.msg}</span>`;
          div.onclick = () => {
            editor.gotoLine(issue.line);
            editor.focus();
            if(window.innerWidth < 900) $('.nav-btn[data-target="tab-editor"]').click();
          };
          reportBox.appendChild(div);
        });
      }
    }

    $('#lintStatus').onclick = () => $('#lintReportBox').classList.toggle('visible');

    // Автоопределение синтаксиса
    function detectLang(code) {
      const ov = $('#langOverride').value; if(ov !== 'auto') return ov;
      if(/import React|<[a-z]+>.*<\/[a-z]+>/i.test(code) && !/<html/i.test(code)) return 'jsx';
      if(/<\s*html\b/i.test(code) || /<style|<div|<span|<h1/i.test(code)) return 'html';
      if(/:\s*(number|string|boolean|any)\b|\binterface\b/.test(code)) return 'ts';
      if(/\bdef\s+\w+\(|\bimport\s+\w+|print\s*\(/.test(code) && !/[;{}]/.test(code)) return 'py';
      return 'js';
    }

    function detectAndApplyMode() {
      const code = editor.getValue();
      const lang = detectLang(code);
      const modeMap = { html:'html', jsx:'javascript', js:'javascript', ts:'typescript', py:'python' };
      editor.session.setMode(`ace/mode/${modeMap[lang] || 'javascript'}`);
      runLinter(code, lang);
      return lang;
    }

    editor.session.on('change', () => {
      localStorage.setItem('ucc4_code', editor.getValue());
      detectAndApplyMode();
    });

    // Стартовый демонстрационный код
    const DEFAULT_CODE = `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #111; color: white; }\n  </style>\n</head>\n<body>\n  <h1>UCC v4.1 Мобильная Вкладка! 🚀</h1>\n  <script>\n    var приветствие = "Автоанализатор проверит этот код!";\n    console.log("Лог успешно пишется в консоль.");\n  <\/script>\n</body>\n</html>`;
    editor.setValue(localStorage.getItem('ucc4_code') || DEFAULT_CODE, -1);
    detectAndApplyMode();

    // Динамический импорт зависимостей (Babel / TypeScript)
    function loadScript(src) {
      return new Promise((res, rej) => {
        if(document.querySelector(`script[src="${src}"]`)) return res();
        const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    // Исполнение проектов
    async function run() {
      if (lintErrorsCount > 0) {
        alert('Запуск заблокирован: Анализатор обнаружил критические ошибки логики или синтаксиса!');
        $('#lintReportBox').classList.add('visible');
        return;
      }

      const code = editor.getValue();
      const lang = detectAndApplyMode();
      $('#clearConsole').click();
      
      if(window.innerWidth < 900) $('#outputNavBtn').click();

      try {
        if (['html', 'jsx', 'js', 'ts'].includes(lang)) {
          addRow('info', 'Генерация превью-страницы...');
          
          let compiledCode = code;
          if (lang === 'jsx') {
            await loadScript('https://unpkg.com/@babel/standalone/babel.min.js');
            compiledCode = Babel.transform(code, { presets: ['react', 'env'] }).code;
          } else if (lang === 'ts') {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/typescript/5.6.3/typescript.min.js');
            compiledCode = window.ts.transpile(code, { target: 'ES2020' });
          }

          // Построение окружения изоляции с обратной маршрутизацией сообщений консоли
          let docHtml = '';
          const captureScript = `<script>
            (function(){
              function send(k, a){ if(window.opener) window.opener.postMessage({type:'console', level:k, args:[].slice.call(a)}, '*'); }
              ['log','info','warn','error'].forEach(fn => { const o=console[fn]; console[fn]=function(){ send(fn, arguments); o&&o.apply(console, arguments); } });
              window.onerror = (msg, url, line) => send('error', [msg + " (Строка: " + line + ")"]);
            })();
          <\/script>`;

          if (lang === 'html') {
            docHtml = code.includes('<head>') ? code.replace('<head>', '<head>' + captureScript) : captureScript + code;
          } else {
            docHtml = `<!DOCTYPE html><html><head>${captureScript}</head><body><div id="root"></div><script>${compiledCode}<\/script></body></html>`;
          }

          // Возвращённый классический метод вывода проекта в новой независимой вкладке браузера
          const previewWindow = window.open('', '_blank');
          previewWindow.document.open();
          previewWindow.document.write(docHtml);
          previewWindow.document.close();
        } 
        else if (lang === 'py') {
          addRow('info', 'Инициализация Python (Pyodide)...');
          if(!window.pyodide) {
            await loadScript('https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js');
            window.pyodide = await loadPyodide();
            window.pyodide.setStdout({ batched: s => addRow('log', s) });
            window.pyodide.setStderr({ batched: s => addRow('error', s) });
          }
          await window.pyodide.runPythonAsync(code);
        }
      } catch (err) {
        addRow('error', String(err));
      }
    }

    $('#runBtn').onclick = run;
    $('#langOverride').onchange = detectAndApplyMode;

    // Перехват логов из открытой вкладки превью
    window.addEventListener('message', e => {
      if(e.data?.type === 'console') {
        const text = e.data.args.map(x => typeof x === 'object' ? JSON.stringify(x, null, 2) : String(x)).join(' ');
        addRow(e.data.level, text);
      }
    });
  </script>
</body>
</html>
