<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Valentín</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f0eb;
            --text-color: #4a3b32;
            --tree-brown: #825a3d;
            --line-color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
        }

        /* --- СТАРТОВЫЙ ЭКРАН --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            background-color: var(--bg-color);
            transition: opacity 0.5s ease;
        }

        .start-heart {
            width: 80px; height: 80px;
            background-color: #d9383a;
            position: relative;
            transform: rotate(-45deg);
            animation: pulse 1s infinite;
        }

        .start-heart::before, .start-heart::after {
            content: ''; width: 80px; height: 80px;
            background-color: #d9383a;
            border-radius: 50%;
            position: absolute;
        }

        .start-heart::before { top: -40px; left: 0; }
        .start-heart::after { top: 0; left: 40px; }

        .start-text {
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #d9383a;
        }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        /* --- ЛИНИЯ ЗЕМЛИ --- */
        .ground-line {
            position: absolute;
            bottom: 6%; 
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--line-color);
            z-index: 10;
        }

        /* --- ТЕКСТ И СЧЕТЧИК --- */
        #text-section {
            position: absolute;
            top: 25%;
            left: 8%;
            width: 45%;
            opacity: 0;
            transform: translateX(40px);
            /* Ускоренное появление текста */
            transition: opacity 1.2s ease, transform 1.2s ease;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #text-section.visible {
            opacity: 1;
            transform: translateX(0);
        }

        #poem-container {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .poem-line { margin-bottom: 20px; }
        .author { margin-top: 20px; font-weight: 600; }

        .timer-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .timer-numbers {
            display: flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .timer-numbers span.num { font-size: 2.5rem; font-weight: 600; }
        .timer-label { font-size: 1rem; margin-right: 15px; color: #666; }

        /* --- ДЕРЕВО --- */
        #tree-container {
            position: absolute;
            bottom: calc(6% + 4px); /* Жестко стоит на линии */
            left: 50%;
            transform: translateX(-50%) scale(1.1);
            transform-origin: bottom center;
            width: 350px;
            height: 500px;
            z-index: 5;
            /* Ускоренный сдвиг дерева */
            transition: all 1.2s ease-in-out;
            pointer-events: none;
        }

        /* Сдвиг и уменьшение дерева вправо */
        #tree-container.shifted {
            left: 75%;
            transform: translateX(-50%) scale(0.85);
        }

        /* Ствол */
        .tree-trunk-wrapper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55px; /* Более тонкое основание */
            height: 0; 
            /* Быстрый рост ствола */
            transition: height 0.4s ease-out;
        }

        .tree-trunk-visual {
            width: 100%;
            height: 100%;
            background-color: var(--tree-brown);
            /* Сужение до ~15px на макушке */
            clip-path: polygon(0 100%, 100% 100%, 63% 0, 37% 0);
        }

        /* Скрывает острый срез верхушки ствола */
        .trunk-cap {
            position: absolute;
            top: -7px;
            left: calc(50% - 7px);
            width: 14px;
            height: 14px;
            background-color: var(--tree-brown);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* Крона (Сердечки) */
        .leaves-container {
            position: absolute;
            bottom: 150px; /* Крона сидит прямо на ветках */
            width: 340px;
            height: 320px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
        }

        .leaf-heart {
            position: absolute;
            width: 16px; height: 16px;
            transform: rotate(-45deg) scale(0);
            opacity: 0;
            /* Быстрое появление листиков */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease;
        }

        .leaf-heart::before, .leaf-heart::after {
            content: ''; width: 100%; height: 100%;
            border-radius: 50%;
            position: absolute;
            background-color: inherit;
        }

        .leaf-heart::before { top: -50%; left: 0; }
        .leaf-heart::after { top: 0; left: 50%; }

        @keyframes fall {
            0% { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; }
            100% { transform: translate(-30vw, 70vh) rotate(-90deg) scale(0.6); opacity: 0; }
        }

        .falling {
            animation: fall 3s ease-in forwards !important;
        }

        /* --- АДАПТИВНОСТЬ ДЛЯ ТЕЛЕФОНОВ --- */
        @media (max-width: 900px) {
            #tree-container.shifted {
                left: 50%;
                transform: translateX(-50%) scale(0.65); /* Сильнее уменьшаем на мобильных */
            }

            #text-section {
                top: 5%;
                left: 5%;
                width: 90%;
                transform: translateY(-30px);
            }

            #text-section.visible {
                transform: translateY(0);
            }

            #poem-container { font-size: 2rem; margin-bottom: 20px; }
            .timer-numbers span.num { font-size: 2rem; }
            .timer-label { margin-right: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startAnimation()">
        <div class="start-heart"></div>
        <div class="start-text">San Valentín</div>
    </div>

    <div id="text-section">
        <div id="poem-container">
            <div class="poem-line">Para el amor de mi vida:</div>
            <div class="poem-line">Si pudiera elegir un lugar<br>seguro, sería a tu lado.</div>
            <div class="poem-line">Cuanto más tiempo estoy<br>contigo más te amo.</div>
            <div class="author">— I Love You!</div>
        </div>
        <div class="timer-container" id="timer-box">
            <div class="timer-title">Mi amor por ti comenzó hace...</div>
            <div class="timer-numbers">
                <span class="num" id="days">0</span> <span class="timer-label">días</span> 
                <span class="num" id="hours">0</span> <span class="timer-label">horas</span> 
                <span class="num" id="mins">0</span> <span class="timer-label">minutos</span> 
                <span class="num" id="secs">0</span> <span class="timer-label">segundos</span>
            </div>
        </div>
    </div>

    <div id="tree-container">
        <div class="tree-trunk-wrapper" id="trunk-wrapper">
            <div class="tree-trunk-visual"></div>
            <div class="trunk-cap" id="trunk-cap"></div>
        </div>
        <div class="leaves-container" id="leaves"></div>
    </div>

    <div class="ground-line"></div>

    <script>
        const startDate = new Date(2025, 1, 14, 12, 0, 0); 
        const colors = ['#a62c2b', '#d9383a', '#f27b82', '#f7b2b7', '#c92a2a', '#e85d68'];

        function startAnimation() {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                growTree();
            }, 400); // Быстрое скрытие начального экрана
        }

        function growTree() {
            const trunkW = document.getElementById('trunk-wrapper');
            trunkW.style.height = '290px'; // Высота основного ствола
            
            setTimeout(() => { document.getElementById('trunk-cap').style.opacity = '1'; }, 350);

            // Точная структура веток (как на фото)
            // (родитель, отступ снизу, угол, толщина, длина, задержка появления, [побочные ветки])
            
            // Левая нижняя
            createSpecificBranch(trunkW, '70px', -45, 9, 120, 100, [
                { bottom: '40px', rotate: 35, width: 6, height: 60, delay: 100 }
            ]);
            // Правая нижняя
            createSpecificBranch(trunkW, '100px', 50, 8, 110, 150, []);
            
            // Левая средняя
            createSpecificBranch(trunkW, '150px', -35, 7, 130, 200, [
                { bottom: '50px', rotate: 40, width: 5, height: 65, delay: 100 }
            ]);
            // Правая средняя
            createSpecificBranch(trunkW, '180px', 40, 7, 120, 250, [
                { bottom: '45px', rotate: -35, width: 5, height: 60, delay: 100 }
            ]);

            // Верхние боковые
            createSpecificBranch(trunkW, '230px', -25, 6, 90, 300, []);
            createSpecificBranch(trunkW, '250px', 30, 6, 80, 350, []);

            // Разветвление на самой макушке (Y)
            createSpecificBranch(trunkW, '285px', -15, 5, 75, 400, []);
            createSpecificBranch(trunkW, '285px', 15, 5, 75, 400, []);

            // Запуск листьев и анимации сдвига намного быстрее
            setTimeout(() => { spawnLeavesInHeartShape(); }, 800);
        }

        // Функция для точного создания закругленных веток с эффектом "вытягивания"
        function createSpecificBranch(parent, bottom, rotate, width, height, delay, subBranches = []) {
            const branch = document.createElement('div');
            branch.style.position = 'absolute';
            branch.style.bottom = bottom;
            branch.style.left = '50%';
            branch.style.width = width + 'px';
            branch.style.height = '0px'; // Начинаем с 0 для эффекта роста
            branch.style.backgroundColor = 'var(--tree-brown)';
            branch.style.borderRadius = '10px'; // Закругленные аккуратные концы
            branch.style.transformOrigin = 'bottom center';
            branch.style.transform = `translateX(-50%) rotate(${rotate}deg)`;
            branch.style.transition = 'height 0.4s ease-out'; // Очень быстрый рост
            
            parent.appendChild(branch);

            // Активируем рост
            setTimeout(() => {
                branch.style.height = height + 'px';

                // Запускаем рост побочных веточек, когда основная почти выросла
                subBranches.forEach(sb => {
                    setTimeout(() => {
                        createSpecificBranch(branch, sb.bottom, sb.rotate, sb.width, sb.height, 0, []);
                    }, sb.delay);
                });
            }, delay);
        }

        function spawnLeavesInHeartShape() {
            const container = document.getElementById('leaves');
            const totalLeaves = 350; 
            const radius = 145; 
            let count = 0;
            let attempts = 0;

            while (count < totalLeaves && attempts < 10000) {
                const x = (Math.random() * 2 - 1) * 1.5; 
                const y = (Math.random() * 2 - 1) * 1.5;
                const y_math = -y; 
                
                const eq = Math.pow(x*x + y_math*y_math - 1, 3) - (x*x * Math.pow(y_math, 3));
                
                if (eq <= 0) {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf-heart';
                    leaf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    leaf.style.left = (x * radius + 170) + 'px';
                    leaf.style.top = (y * radius + 160) + 'px';
                    
                    const scale = 0.4 + Math.random() * 0.6;
                    container.appendChild(leaf);

                    // Быстрое появление
                    setTimeout(() => {
                        leaf.style.transform = `rotate(${Math.random() * 60 - 75}deg) scale(${scale})`;
                        leaf.style.opacity = '1';
                    }, Math.random() * 800); // Максимум 0.8 секунд на все листья
                    count++;
                }
                attempts++;
            }

            // БЫСТРЫЙ СДВИГ (через 1.5 секунды после старта листьев)
            setTimeout(() => {
                document.getElementById('tree-container').classList.add('shifted');
                document.getElementById('text-section').classList.add('visible');
                startTimer();
                startFallingLeaves();
            }, 1500); 
        }

        function startTimer() {
            function update() {
                const now = new Date();
                const diff = now - startDate;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                const secs = Math.floor((diff / 1000) % 60);

                document.getElementById('days').innerText = days;
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('mins').innerText = mins.toString().padStart(2, '0');
                document.getElementById('secs').innerText = secs.toString().padStart(2, '0');
            }
            update();
            setInterval(update, 1000);
        }

        function startFallingLeaves() {
            const leaves = document.querySelectorAll('.leaf-heart');
            setInterval(() => {
                if(leaves.length > 0) {
                    const randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
                    const fallingLeaf = randomLeaf.cloneNode(true);
                    
                    fallingLeaf.style.transform = randomLeaf.style.transform; 
                    document.getElementById('leaves').appendChild(fallingLeaf);
                    
                    setTimeout(() => fallingLeaf.classList.add('falling'), 50);
                    setTimeout(() => fallingLeaf.remove(), 3500);
                }
            }, 800);
        }
    </script>
</body>
</html>
