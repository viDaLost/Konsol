<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Galaxy Heart Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 50% 45%, rgba(255, 205, 240, 0.04), transparent 16%),
                radial-gradient(circle at 22% 18%, rgba(193, 112, 255, 0.14), transparent 30%),
                radial-gradient(circle at 76% 28%, rgba(255, 110, 160, 0.12), transparent 28%),
                radial-gradient(circle at 56% 84%, rgba(145, 98, 255, 0.10), transparent 34%),
                #04040a;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle, rgba(10, 8, 20, 0.30), rgba(2, 2, 8, 0.84));
            color: rgba(255,255,255,0.94);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            font-size: clamp(18px, 2vw, 28px);
            z-index: 10;
            transition: opacity 0.7s ease, visibility 0.7s ease;
            backdrop-filter: blur(8px);
        }
        #loading.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .vignette {
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 2;
            background:
                radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.10) 66%, rgba(0,0,0,0.62) 100%),
                linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 20%, transparent 80%, rgba(255,255,255,0.04));
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка галактики любви...</div>
    <div id="canvas-container">
        <div class="vignette"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const loadingEl = document.getElementById('loading');

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x06050c, 0.0061);

        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 1400);
        camera.position.set(0, 12, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.18;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.045;
        controls.minDistance = 9;
        controls.maxDistance = 68;
        controls.maxPolarAngle = Math.PI * 0.76;
        controls.target.set(0, 0.2, 0);

        const galaxyGroup = new THREE.Group();
        const overlayGroup = new THREE.Group();
        const floatingGroup = new THREE.Group();
        scene.add(galaxyGroup, overlayGroup, floatingGroup);

        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous');

        const floatingObjects = [];
        const photoSlots = [];
        const textSlots = [];
        const orbitObjects = [];
        const tintResponsive = [];
        const tmpCameraQuat = new THREE.Quaternion();
        const tmpParentQuat = new THREE.Quaternion();
        const tmpInvParentQuat = new THREE.Quaternion();

        let heartGlowSprite;
        let heartHaloSprite;
        let heartMesh;
        let heartLight;
        let galaxyStars;
        let galaxyDust;
        let galaxyStreams;
        let deepStars;
        let farNebula;
        let coreRing;
        let auraRing;

        const romanticPhrases = [
            'Люблю тебя',
            'Ты моё сердце',
            'Ты моя вселенная',
            'С тобой навсегда',
            'Нежность',
            'Бесконечно люблю',
            'Моё счастье',
            'Только ты',
            'Ты мой свет',
            'Ты моё чудо'
        ];

        const colorPhases = [
            { a: '#ffd6f1', b: '#ffffff', c: '#ff8fd1' },
            { a: '#ffffff', b: '#d3bcff', c: '#b681ff' },
            { a: '#ffd8de', b: '#ffffff', c: '#ff6c8d' },
            { a: '#f4d5ff', b: '#ffffff', c: '#ff9ec8' }
        ];

        const params = {
            radius: 34,
            innerVoid: 7.2,
            particleCount: 26000,
            streamCount: 12000,
            dustCount: 12000,
            arms: 4,
            spin: 4.6
        };

        function hexToColor(hex) {
            return new THREE.Color(hex);
        }

        function blendPhase(time, speed = 0.055) {
            const scaled = time * speed;
            const phase = Math.floor(scaled) % colorPhases.length;
            const next = (phase + 1) % colorPhases.length;
            const mix = scaled - Math.floor(scaled);

            return {
                a: hexToColor(colorPhases[phase].a).lerp(hexToColor(colorPhases[next].a), mix),
                b: hexToColor(colorPhases[phase].b).lerp(hexToColor(colorPhases[next].b), mix),
                c: hexToColor(colorPhases[phase].c).lerp(hexToColor(colorPhases[next].c), mix)
            };
        }

        function createRadialTexture(inner, middle, outer) {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            g.addColorStop(0, inner);
            g.addColorStop(0.34, middle);
            g.addColorStop(1, outer);
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createNebulaTexture(colors) {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < 18; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = 120 + Math.random() * 260;
                const color = colors[i % colors.length];
                const g = ctx.createRadialGradient(x, y, r * 0.08, x, y, r);
                g.addColorStop(0, color);
                g.addColorStop(0.34, color.replace(/0\.[0-9]+\)/, '0.10)'));
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.fillRect(x - r, y - r, r * 2, r * 2);
            }

            for (let i = 0; i < 460; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const s = Math.random() < 0.95 ? 1.2 : 2.2;
                ctx.fillStyle = `rgba(255,255,255,${0.08 + Math.random() * 0.32})`;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createBackgroundDome() {
            const texture = createNebulaTexture([
                'rgba(255, 151, 212, 0.24)',
                'rgba(178, 126, 255, 0.22)',
                'rgba(255, 255, 255, 0.10)',
                'rgba(255, 102, 140, 0.16)'
            ]);
            const dome = new THREE.Mesh(
                new THREE.SphereGeometry(520, 48, 48),
                new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.BackSide,
                    transparent: true,
                    opacity: 0.94,
                    depthWrite: false
                })
            );
            scene.add(dome);
            return dome;
        }

        function addLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.46);
            const hemi = new THREE.HemisphereLight(0xffd9f1, 0x120915, 1.0);
            const pointA = new THREE.PointLight(0xff9fcb, 28, 180, 2);
            const pointB = new THREE.PointLight(0xc6b5ff, 14, 180, 2);
            pointA.position.set(0, 0.4, 0);
            pointB.position.set(-12, 6, -16);
            scene.add(ambient, hemi, pointA, pointB);
            tintResponsive.push({ kind: 'light', material: pointA });
            tintResponsive.push({ kind: 'light2', material: pointB });
            heartLight = pointA;
        }

        function addDeepSpaceStars() {
            const count = 1800;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const colorA = new THREE.Color('#ffffff');
            const colorB = new THREE.Color('#ffcaec');
            const colorC = new THREE.Color('#d1c0ff');

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const radius = 150 + Math.random() * 280;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.cos(phi);
                positions[i3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
                const mixed = colorA.clone().lerp(Math.random() > 0.5 ? colorB : colorC, Math.random() * 0.8);
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 1.12,
                map: createRadialTexture('rgba(255,255,255,1)', 'rgba(255,255,255,0.70)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.9,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            deepStars = new THREE.Points(geometry, material);
            scene.add(deepStars);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function spiralPosition(radius, branch, offset = 0, tightness = params.spin) {
            const base = branch / params.arms * Math.PI * 2;
            const angle = base + radius * tightness * 0.17 + offset;
            return {
                x: Math.cos(angle) * radius,
                z: Math.sin(angle) * radius,
                angle
            };
        }

        function generateGalaxyCore() {
            const positions = new Float32Array(params.particleCount * 3);
            const colors = new Float32Array(params.particleCount * 3);
            const inner = new THREE.Color('#ffffff');
            const mid = new THREE.Color('#ffd0ee');
            const outer = new THREE.Color('#cab7ff');

            for (let i = 0; i < params.particleCount; i++) {
                const i3 = i * 3;
                const branch = i % params.arms;
                const radius = params.innerVoid + Math.pow(Math.random(), 0.82) * (params.radius - params.innerVoid);
                const armOffset = (Math.random() - 0.5) * (0.14 + radius * 0.017);
                const swirl = spiralPosition(radius, branch, armOffset);

                const tangentSpread = (Math.random() - 0.5) * (0.1 + radius * 0.04);
                const radialSpread = (Math.random() - 0.5) * (0.08 + radius * 0.03);
                const dirX = Math.cos(swirl.angle);
                const dirZ = Math.sin(swirl.angle);
                const tangentX = -dirZ;
                const tangentZ = dirX;

                positions[i3] = swirl.x + tangentX * tangentSpread + dirX * radialSpread;
                positions[i3 + 1] = (Math.random() - 0.5) * (0.22 + radius * 0.035);
                positions[i3 + 2] = swirl.z + tangentZ * tangentSpread + dirZ * radialSpread;

                const t = radius / params.radius;
                const mixed = inner.clone();
                mixed.lerp(mid, Math.min(t * 1.28, 1));
                mixed.lerp(outer, Math.max((t - 0.32) / 0.68, 0));
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.19,
                map: createRadialTexture('rgba(255,255,255,1)', 'rgba(255,255,255,0.55)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.94,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyStars = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyStars);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function generateGalaxyStreams() {
            const positions = new Float32Array(params.streamCount * 3);
            const colors = new Float32Array(params.streamCount * 3);
            const a = new THREE.Color('#ffffff');
            const b = new THREE.Color('#ffc0e5');
            const c = new THREE.Color('#ff7ca4');

            for (let i = 0; i < params.streamCount; i++) {
                const i3 = i * 3;
                const branch = i % params.arms;
                const radius = params.innerVoid + 1.5 + Math.pow(Math.random(), 0.58) * (params.radius - params.innerVoid - 1.2);
                const ribbonOffset = Math.sin(radius * 0.82 + branch * 1.4) * 0.11;
                const swirl = spiralPosition(radius, branch, ribbonOffset, params.spin + 0.6);
                const side = (Math.random() - 0.5) * (0.05 + radius * 0.025);
                const thickness = (Math.random() - 0.5) * (0.03 + radius * 0.02);
                const dirX = Math.cos(swirl.angle);
                const dirZ = Math.sin(swirl.angle);
                const tangentX = -dirZ;
                const tangentZ = dirX;

                positions[i3] = swirl.x + tangentX * side;
                positions[i3 + 1] = thickness;
                positions[i3 + 2] = swirl.z + tangentZ * side;

                const t = radius / params.radius;
                const mixed = a.clone();
                mixed.lerp(b, Math.min(t * 1.2, 1));
                mixed.lerp(c, Math.max((t - 0.4) / 0.6, 0));
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.14,
                map: createRadialTexture('rgba(255,255,255,0.95)', 'rgba(255,255,255,0.38)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.64,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyStreams = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyStreams);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function generateGalaxyDust() {
            const positions = new Float32Array(params.dustCount * 3);
            const colors = new Float32Array(params.dustCount * 3);
            const a = new THREE.Color('#ffffff');
            const b = new THREE.Color('#e5cfff');
            const c = new THREE.Color('#ffc7df');

            for (let i = 0; i < params.dustCount; i++) {
                const i3 = i * 3;
                const radius = params.innerVoid + 1 + Math.random() * (params.radius - params.innerVoid + 10);
                const branch = i % params.arms;
                const swirl = spiralPosition(radius, branch, (Math.random() - 0.5) * 0.7, params.spin + 0.2);
                const wide = 0.26 + radius * 0.07;
                positions[i3] = swirl.x + (Math.random() - 0.5) * wide;
                positions[i3 + 1] = (Math.random() - 0.5) * (0.55 + radius * 0.055);
                positions[i3 + 2] = swirl.z + (Math.random() - 0.5) * wide;
                const t = Math.min(radius / (params.radius + 10), 1);
                const mixed = a.clone();
                mixed.lerp(Math.random() > 0.5 ? b : c, Math.random() * 0.8 + t * 0.25);
                colors[i3] = mixed.r;
                colors[i3 + 1] = mixed.g;
                colors[i3 + 2] = mixed.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.105,
                map: createRadialTexture('rgba(255,255,255,0.75)', 'rgba(255,255,255,0.26)', 'rgba(255,255,255,0)'),
                transparent: true,
                opacity: 0.38,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                sizeAttenuation: true
            });

            galaxyDust = new THREE.Points(geometry, material);
            galaxyGroup.add(galaxyDust);
            tintResponsive.push({ kind: 'materialColor', material });
        }

        function addOuterAuraRings() {
            const ringTexture = createRadialTexture('rgba(255,255,255,0.95)', 'rgba(255,255,255,0.38)', 'rgba(255,255,255,0)');
            const ringMaterial = new THREE.SpriteMaterial({
                map: ringTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                opacity: 0.12
            });

            coreRing = new THREE.Sprite(ringMaterial.clone());
            coreRing.scale.set(14.5, 14.5, 1);
            galaxyGroup.add(coreRing);

            auraRing = new THREE.Sprite(ringMaterial.clone());
            auraRing.scale.set(22.5, 22.5, 1);
            auraRing.material.opacity = 0.075;
            galaxyGroup.add(auraRing);

            tintResponsive.push({ kind: 'spriteMaterial', material: coreRing.material });
            tintResponsive.push({ kind: 'spriteMaterial', material: auraRing.material });
        }

        function createHeartShape() {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0.55);
            shape.bezierCurveTo(0, 0.05, -0.78, -0.54, -1.28, -0.54);
            shape.bezierCurveTo(-2.00, -0.54, -2.02, 0.46, -2.02, 0.46);
            shape.bezierCurveTo(-2.02, 1.18, -1.23, 1.78, 0, 2.62);
            shape.bezierCurveTo(1.23, 1.78, 2.02, 1.18, 2.02, 0.46);
            shape.bezierCurveTo(2.02, 0.46, 2.00, -0.54, 1.28, -0.54);
            shape.bezierCurveTo(0.78, -0.54, 0, 0.05, 0, 0.55);
            return shape;
        }

        function addHeartCore() {
            const heartShape = createHeartShape();
            const geometry = new THREE.ExtrudeGeometry(heartShape, {
                depth: 0.98,
                bevelEnabled: true,
                bevelSegments: 8,
                steps: 1,
                bevelSize: 0.22,
                bevelThickness: 0.18,
                curveSegments: 48
            });
            geometry.center();

            const material = new THREE.MeshStandardMaterial({
                color: '#ff3f53',
                emissive: '#c7001c',
                emissiveIntensity: 2.65,
                roughness: 0.18,
                metalness: 0.06,
                transparent: true,
                opacity: 0.99
            });

            heartMesh = new THREE.Mesh(geometry, material);
            heartMesh.scale.set(2.34, 2.34, 1.72);
            heartMesh.position.set(0, 0.1, 0);
            galaxyGroup.add(heartMesh);
            tintResponsive.push({ kind: 'heartMesh', material });

            heartHaloSprite = null;
            heartGlowSprite = null;
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 58;
            const padX = 46;
            const padY = 26;

            ctx.font = `900 ${fontSize}px "Rubik Mono One", Arial`;
            const metrics = ctx.measureText(text);
            canvas.width = Math.ceil(metrics.width + padX * 2);
            canvas.height = fontSize + padY * 2 + 8;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `900 ${fontSize}px "Rubik Mono One", Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.55, '#f7f7f7');
            gradient.addColorStop(1, '#ffffff');

            ctx.shadowColor = 'rgba(0, 0, 0, 0)';
            ctx.shadowBlur = 0;
            ctx.fillStyle = gradient;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 1);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.needsUpdate = true;
            return { texture, width: canvas.width, height: canvas.height };
        }

        function createText3DGroup(text) {
            const { texture, width, height } = createTextTexture(text);
            const aspectW = width / 122;
            const aspectH = height / 122;

            const group = new THREE.Group();
            const geo = new THREE.PlaneGeometry(aspectW, aspectH);
            const depthLayers = 5;
            const spacing = 0.045;

            for (let i = 0; i < depthLayers; i++) {
                const isFront = i === depthLayers - 1;
                const plane = new THREE.Mesh(
                    geo,
                    new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        depthWrite: false,
                        side: THREE.DoubleSide,
                        color: isFront ? new THREE.Color('#ffffff') : new THREE.Color('#6e1823').lerp(new THREE.Color('#3d0d15'), i / (depthLayers - 1)),
                        opacity: isFront ? 1 : 0.82
                    })
                );
                plane.position.z = -((depthLayers - 1 - i) * spacing);
                group.add(plane);
            }

            group.userData.isBillboard = true;
            return group;
        }

        function createImageCard(url) {
            const group = new THREE.Group();

            const frame = new THREE.Mesh(
                new THREE.PlaneGeometry(2.78, 3.28),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.96, side: THREE.DoubleSide })
            );
            frame.position.z = -0.01;
            group.add(frame);

            const innerShadow = new THREE.Mesh(
                new THREE.PlaneGeometry(2.52, 2.98),
                new THREE.MeshBasicMaterial({ color: 0x12090c, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
            );
            innerShadow.position.z = -0.005;
            group.add(innerShadow);

            const photoMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.99,
                side: THREE.DoubleSide
            });

            const photo = new THREE.Mesh(new THREE.PlaneGeometry(2.34, 2.78), photoMaterial);
            photo.position.z = 0.01;
            group.add(photo);

            textureLoader.load(
                url,
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    photoMaterial.map = texture;
                    photoMaterial.needsUpdate = true;
                },
                undefined,
                () => {
                    const fallback = document.createElement('canvas');
                    fallback.width = 360;
                    fallback.height = 430;
                    const ctx = fallback.getContext('2d');
                    const g = ctx.createLinearGradient(0, 0, 360, 430);
                    g.addColorStop(0, '#ffd2d8');
                    g.addColorStop(1, '#ff4d5d');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, 360, 430);
                    ctx.fillStyle = 'rgba(255,255,255,0.94)';
                    ctx.font = 'bold 38px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Ваше', 180, 185);
                    ctx.fillText('фото', 180, 235);
                    const texture = new THREE.CanvasTexture(fallback);
                    texture.colorSpace = THREE.SRGBColorSpace;
                    photoMaterial.map = texture;
                    photoMaterial.needsUpdate = true;
                }
            );

            group.userData.isBillboard = true;
            return group;
        }


        function buildFixedSlots(target, count, isPhoto) {
            const radii = isPhoto ? [15.5, 20.5, 25.4, 30.4] : [11.8, 16.8, 21.8, 27.0];
            const yLevels = isPhoto ? [2.8, -2.2, 1.4, -3.0] : [4.0, -4.0, 3.0, -3.2];
            const offsets = isPhoto ? [0.22, -0.14, 0.12, -0.18] : [-0.24, 0.18, -0.16, 0.12];
            let created = 0;

            for (let ring = 0; ring < radii.length && created < count; ring++) {
                for (let arm = 0; arm < params.arms && created < count; arm++) {
                    const offset = offsets[(ring + arm) % offsets.length] + (ring % 2 === 0 ? 0.03 : -0.03);
                    const swirl = spiralPosition(radii[ring], arm, offset, params.spin + (isPhoto ? 0.48 : 0.40));
                    target.push({
                        position: new THREE.Vector3(
                            swirl.x,
                            yLevels[ring] + (arm % 2 === 0 ? 0.22 : -0.22),
                            swirl.z
                        ),
                        scale: isPhoto ? (1.04 + ring * 0.07) : (0.78 + ring * 0.04),
                        bob: isPhoto ? 0.12 : 0.09,
                        pulse: isPhoto ? 0.018 : 0.012
                    });
                    created++;
                }
            }
        }

        function addFloatingElements() {
            const photoCount = 15;
            const textCount = 15;

            buildFixedSlots(photoSlots, photoCount, true);
            buildFixedSlots(textSlots, textCount, false);

            for (let i = 0; i < photoCount; i++) {
                const obj = createImageCard(`https://picsum.photos/seed/galaxy-love-photo-${i}/640/760`);
                const slot = photoSlots[i];
                obj.position.copy(slot.position);
                obj.scale.setScalar(slot.scale);
                obj.userData = {
                    fixedPosition: slot.position.clone(),
                    baseScale: slot.scale,
                    bob: slot.bob,
                    pulse: slot.pulse,
                    floatSpeed: 0.34 + (i % 5) * 0.05,
                    floatOffset: i * 0.77
                };
                floatingObjects.push(obj);
                floatingGroup.add(obj);
            }

            for (let i = 0; i < textCount; i++) {
                const obj = createText3DGroup(romanticPhrases[i % romanticPhrases.length]);
                const slot = textSlots[i];
                obj.position.copy(slot.position);
                obj.scale.setScalar(slot.scale);
                obj.userData = {
                    fixedPosition: slot.position.clone(),
                    baseScale: slot.scale,
                    bob: slot.bob,
                    pulse: slot.pulse,
                    floatSpeed: 0.28 + (i % 4) * 0.05,
                    floatOffset: i * 0.83
                };
                floatingObjects.push(obj);
                floatingGroup.add(obj);
            }
        }

        function addFarNebulaPlanes() {
            const texture = createNebulaTexture([
                'rgba(255,145,202,0.18)',
                'rgba(201,163,255,0.16)',
                'rgba(255,255,255,0.08)',
                'rgba(255,94,128,0.10)'
            ]);

            for (let i = 0; i < 7; i++) {
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(24 + Math.random() * 18, 10 + Math.random() * 8),
                    new THREE.MeshBasicMaterial({
                        map: texture,
                        transparent: true,
                        opacity: 0.12 + Math.random() * 0.06,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        side: THREE.DoubleSide
                    })
                );
                plane.position.set((Math.random() - 0.5) * 58, (Math.random() - 0.5) * 9, (Math.random() - 0.5) * 58);
                plane.rotation.z = Math.random() * Math.PI;
                plane.userData = { rot: (Math.random() - 0.5) * 0.04, drift: Math.random() * Math.PI * 2 };
                overlayGroup.add(plane);
                orbitObjects.push(plane);
                tintResponsive.push({ kind: 'spriteMaterial', material: plane.material });
            }
        }

        function faceObjectToCameraLocal(object) {
            camera.getWorldQuaternion(tmpCameraQuat);
            object.parent.getWorldQuaternion(tmpParentQuat);
            tmpInvParentQuat.copy(tmpParentQuat).invert();
            object.quaternion.copy(tmpCameraQuat).premultiply(tmpInvParentQuat);
        }

        async function ensureFontsReady() {
            if (!document.fonts || !document.fonts.load) return;
            try {
                await Promise.all([
                    document.fonts.load('900 76px "Rubik Mono One"'),
                    document.fonts.load('800 20px Inter')
                ]);
            } catch (_) {
                // ignore font loading failures and continue with fallback fonts
            }
        }

        async function init() {
            farNebula = createBackgroundDome();
            addLights();
            addDeepSpaceStars();
            generateGalaxyCore();
            generateGalaxyStreams();
            generateGalaxyDust();
            addOuterAuraRings();
            addHeartCore();
            addFarNebulaPlanes();
            await ensureFontsReady();
            addFloatingElements();
            setTimeout(() => loadingEl.classList.add('hidden'), 900);
            animate();
        }

        const clock = new THREE.Clock();

        function applyPalette(palette, time) {
            renderer.toneMappingExposure = 1.12 + Math.sin(time * 0.22) * 0.05;
            scene.fog.color.copy(palette.a).lerp(palette.c, 0.10);

            tintResponsive.forEach((item) => {
                if (item.kind === 'materialColor') {
                    item.material.color.copy(palette.b).lerp(palette.a, 0.35);
                } else if (item.kind === 'spriteMaterial') {
                    item.material.color.copy(palette.a).lerp(palette.c, 0.20);
                } else if (item.kind === 'heartMesh') {
                    item.material.color.set('#ff3f53');
                    item.material.emissive.set('#c7001c');
                } else if (item.kind === 'light') {
                    item.material.color.set('#ff4a5c');
                    item.material.intensity = 30 + Math.sin(time * 1.0) * 4;
                } else if (item.kind === 'light2') {
                    item.material.color.copy(palette.a).lerp(palette.b, 0.35);
                    item.material.intensity = 12 + Math.sin(time * 0.8 + 1) * 1.5;
                } else if (item.kind === 'photoGlow') {
                    item.material.color.set('#ffffff');
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const palette = blendPhase(t, 0.11);

            applyPalette(palette, t);

            galaxyGroup.rotation.y = t * 0.028;
            galaxyGroup.rotation.z = Math.sin(t * 0.18) * 0.015;
            floatingGroup.rotation.y = t * 0.018;
            overlayGroup.rotation.y = -t * 0.004;
            farNebula.rotation.y = t * 0.002;
            farNebula.rotation.z = Math.sin(t * 0.03) * 0.02;
            if (deepStars) deepStars.rotation.y = t * 0.0018;
            if (galaxyDust) galaxyDust.rotation.y = -t * 0.008;
            if (galaxyStreams) galaxyStreams.rotation.y = t * 0.005;

            const heartPulse = 1 + Math.sin(t * 2.15) * 0.08 + Math.sin(t * 4.3) * 0.025;
            if (heartMesh) {
                heartMesh.scale.set(2.34 * heartPulse, 2.34 * heartPulse, 1.72 * heartPulse);
                heartMesh.rotation.set(
                    0.12 + Math.sin(t * 0.31) * 0.045,
                    Math.sin(t * 0.42) * 0.22,
                    Math.PI + Math.sin(t * 0.28) * 0.03
                );
            }
            if (heartHaloSprite) {
                heartHaloSprite.scale.set(9.8 * (1 + Math.sin(t * 2.15) * 0.06), 9.8 * (1 + Math.sin(t * 2.15) * 0.06), 1);
            }
            if (heartGlowSprite) {
                heartGlowSprite.scale.set(15.4 * (1 + Math.sin(t * 1.65) * 0.09), 15.4 * (1 + Math.sin(t * 1.65) * 0.09), 1);
                heartGlowSprite.material.opacity = 0.42 + Math.sin(t * 1.8) * 0.10;
            }
            if (coreRing) {
                coreRing.scale.setScalar(14.5 * (1 + Math.sin(t * 1.8) * 0.035));
                coreRing.material.opacity = 0.045 + Math.sin(t * 1.4) * 0.008;
            }
            if (auraRing) {
                auraRing.scale.setScalar(22.5 * (1 + Math.sin(t * 1.2 + 0.6) * 0.04));
                auraRing.material.opacity = 0.022 + Math.sin(t * 1.1 + 0.4) * 0.006;
            }
            if (heartLight) {
                heartLight.intensity = 34 + Math.sin(t * 2.8) * 6;
            }

            floatingObjects.forEach((obj, index) => {
                const u = obj.userData;
                obj.position.x = u.fixedPosition.x;
                obj.position.y = u.fixedPosition.y + Math.sin(t * u.floatSpeed + u.floatOffset) * u.bob;
                obj.position.z = u.fixedPosition.z;
                obj.scale.setScalar(u.baseScale * (1 + Math.sin(t * 0.9 + index) * u.pulse));
                faceObjectToCameraLocal(obj);
            });

            orbitObjects.forEach((obj) => {
                obj.rotation.z += obj.userData.rot * 0.002;
                obj.position.y += Math.sin(t * 0.15 + obj.userData.drift) * 0.0015;
                obj.quaternion.slerp(camera.quaternion, 0.02);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
        });

        init();
    </script>
</body>
</html>
